<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koe + Game — demo de pronunciación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <script>(function() {
// ===== packages/common-api/src/speech/recognition.ts =====
const DEFAULT_CONFIG = {
  lang: "ja-JP",
  continuous: true,
  interimResults: true,
  maxAlternatives: 5,
};
function getSpeechRecognition() {
  if (typeof window === "undefined") return undefined;
  return window.SpeechRecognition || window.webkitSpeechRecognition;
}
function isSpeechSupported() {
  return getSpeechRecognition() !== undefined;
}
function createRecognizer(config = {}, callback) {
  const SR = getSpeechRecognition();
  if (!SR) {
    callback({ kind: "error", data: { type: "unsupported", message: "SpeechRecognition API no está disponible en este navegador" } });
    return { start() {}, stop() {}, abort() {} };
  }
  const recognition = new SR();
  const cfg = { ...DEFAULT_CONFIG, ...config };
  recognition.lang = cfg.lang;
  recognition.continuous = cfg.continuous;
  recognition.interimResults = cfg.interimResults;
  recognition.maxAlternatives = cfg.maxAlternatives;
  recognition.onresult = (event) => {
    const result = event.results[event.resultIndex];
    const alternatives = Array.from(result).map((alt) => ({
      transcript: alt.transcript, confidence: alt.confidence
    }));
    callback({ kind: "result", data: { alternatives, isFinal: result.isFinal } });
  };
  recognition.onerror = (event) => {
    let type;
    switch (event.error) {
      case "no-speech": type = "no-speech"; break;
      case "not-allowed": type = "not-allowed"; break;
      case "network": type = "network"; break;
      default: type = "network";
    }
    callback({ kind: "error", data: { type, message: event.message || event.error } });
  };
  recognition.onend = () => { callback({ kind: "end" }); };
  return {
    start() { recognition.start(); },
    stop() { recognition.stop(); },
    abort() { recognition.abort(); },
  };
}

// ===== packages/common-api/src/speech/normalize.ts =====
function findMatch(candidates, accepted) {
  if (candidates.length === 0 || accepted.length === 0) {
    return { matched: false, candidate: null };
  }
  for (const c of candidates) {
    const match = accepted.some((t) => c.transcript.includes(t) || t.includes(c.transcript));
    if (match) {
      return { matched: true, candidate: c };
    }
  }
  return { matched: false, candidate: null };
}

// ===== packages/common-api/src/speech/index.ts =====
class Koe {
  static async checkCompatibility() {
    let micPermission = "unknown";
    if (typeof navigator !== "undefined" && "permissions" in navigator) {
      try {
        const status = await navigator.permissions.query({ name: "microphone" });
        micPermission = status.state;
      } catch { micPermission = "unknown"; }
    }
    return {
      supported: isSpeechSupported(),
      secureContext: typeof location === "undefined" || location.protocol === "https:" || location.hostname === "localhost",
      online: typeof navigator === "undefined" || navigator.onLine,
      micPermission,
    };
  }

  recognizer = null;
  started = false;
  callbacks;
  _listening = false;
  _userStopped = false;

  constructor(callbacks = {}) { this.callbacks = callbacks; }

  static isSupported() { return isSpeechSupported(); }

  get listening() { return this._listening; }
  set listening(value) {
    this._listening = value;
    this.callbacks.onListeningChange?.(value);
  }

  async requestMicrophone() {
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
      return true;
    } catch {
      this.callbacks.onPermissionDenied?.();
      return false;
    }
  }

  init() {
    if (this.recognizer) return;
    if (!isSpeechSupported()) {
      this.callbacks.onError?.({ type: "unsupported", message: "SpeechRecognition no disponible en este navegador" });
      return;
    }
    this._userStopped = false;
    this.recognizer = createRecognizer(
      { lang: "ja-JP", continuous: true, interimResults: true, maxAlternatives: 5 },
      (event) => {
        switch (event.kind) {
          case "result": this.handleResult(event.data); break;
          case "error": this.handleError(event.data); break;
          case "end": this.handleEnd(); break;
        }
      }
    );
    this.recognizer.start();
    this.started = true;
  }

  get isListening() { return this.started && this.recognizer !== null; }

  destroy() {
    this._userStopped = true;
    this._listening = false;
    this.recognizer?.abort();
    this.recognizer = null;
    this.started = false;
  }

  handleResult(data) {
    if (!this._listening) return;
    if (!data.isFinal) return;
    const candidates = data.alternatives.map((alt, i) => ({
      transcript: alt.transcript.trim(),
      confidence: alt.confidence,
      position: i,
    }));
    this._listening = false;
    this.callbacks.onListeningChange?.(false);
    this.callbacks.onCaptureComplete?.(candidates);
  }

  handleError(error) {
    switch (error.type) {
      case "not-allowed":
        this._userStopped = true;
        this.callbacks.onPermissionDenied?.();
        this.recognizer = null;
        this.started = false;
        break;
      case "no-speech":
        this._listening = false;
        this.callbacks.onListeningChange?.(false);
        this.callbacks.onNoSpeech?.();
        break;
      case "network":
        this.recognizer?.start();
        break;
    }
    this.callbacks.onError?.(error);
  }

  handleEnd() {
    if (!this._userStopped && this.recognizer) {
      this.recognizer.start();
    }
  }
}

// ===== packages/game/src/random.ts =====
function shuffleFisherYates(array) {
  const result = [...array];
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}
function weightedPick(items) {
  const totalWeight = items.reduce((sum, { weight }) => sum + weight, 0);
  let r = Math.random() * totalWeight;
  for (const { item, weight } of items) {
    r -= weight;
    if (r <= 0) return item;
  }
  return items[items.length - 1].item;
}

// ===== packages/game/src/score.ts =====
function calculateExercisePoints(difficulty, accuracy) {
  const base = difficulty * 10;
  const multiplier = accuracy >= 0.9 ? 1.5 : 1;
  return Math.round(base * multiplier);
}

// ===== packages/game/src/achievements.ts =====
function calculateStars(averageAccuracy, thresholds = [0, 70, 90]) {
  let stars = 0;
  for (const t of thresholds) {
    if (averageAccuracy * 100 >= t) stars++;
    else break;
  }
  return Math.min(stars, thresholds.length);
}
function evaluateAchievements(playerState, achievements, unlockedIds) {
  return achievements.filter(
    (a) => !unlockedIds.includes(a.id) && a.condition(playerState)
  );
}

// ===== packages/game/src/evaluate.ts =====
const SPEECH_LEVELS = [
  { threshold: 0.85, level: "Excelente" },
  { threshold: 0.65, level: "Bien" },
  { threshold: 0.45, level: "Aceptable" },
  { threshold: 0.20, level: "Mejorable" },
];
function getSpeechLevel(score) {
  if (score === 0) return "No reconocido";
  for (const l of SPEECH_LEVELS) {
    if (score >= l.threshold) return l.level;
  }
  return "Mejorable";
}

const FEEDBACK = {
  choiceCorrect: "¡Respuesta correcta!",
  choiceWrong: "Respuesta incorrecta.",
  textExact: "¡Coincide exactamente!",
  textPartial: "Casi… revisa la ortografía.",
  textWrong: "No coincide. Revisa el material.",
};
function normalize(text) { return text.trim().toLowerCase(); }
function evaluateChoice(correct, playerAnswer) {
  const match = normalize(playerAnswer) === normalize(correct);
  return { correct: match, accuracy: match ? 1 : 0, type: "choice", feedback: match ? FEEDBACK.choiceCorrect : FEEDBACK.choiceWrong };
}
function evaluateText(accepted, playerAnswer) {
  const playerNorm = normalize(playerAnswer);
  const normalizedAccepted = accepted.map(normalize);
  const exactMatch = normalizedAccepted.some((a) => a === playerNorm);
  if (exactMatch) return { correct: true, accuracy: 1, type: "text", feedback: FEEDBACK.textExact };
  const partialMatch = normalizedAccepted.some((a) => a.includes(playerNorm) || playerNorm.includes(a));
  if (partialMatch) return { correct: false, accuracy: 0.5, type: "text", feedback: FEEDBACK.textPartial };
  return { correct: false, accuracy: 0, type: "text", feedback: FEEDBACK.textWrong };
}
function evaluateSpeech(accepted, candidates) {
  const match = findMatch(candidates, accepted);
  if (!match.matched || !match.candidate) {
    return { score: 0, level: "No reconocido", matchedAt: null, transcript: "" };
  }
  const { candidate } = match;
  const positionScore = 1 - (candidate.position / 5);
  const confidenceScore = candidate.confidence;
  const score = (positionScore * 0.4) + (confidenceScore * 0.6);
  return {
    score,
    level: getSpeechLevel(score),
    matchedAt: candidate.position,
    transcript: candidate.transcript,
  };
}
function evaluateMove(correct, playerAnswer, type) {
  switch (type) {
    case "choice": return evaluateChoice(correct, playerAnswer);
    case "text": return evaluateText(Array.isArray(correct) ? correct : [correct], playerAnswer);
    case "speech": {
      const speechResult = evaluateSpeech(Array.isArray(correct) ? correct : [correct], Array.isArray(playerAnswer) ? playerAnswer : []);
      return {
        correct: speechResult.score > 0,
        accuracy: speechResult.score,
        type: "speech",
        feedback: speechResult.level,
      };
    }
  }
}
function processMove(config, state, move) {
  const correct = config.moveType === "choice" ? config.correctAnswer ?? "" : config.accepted ?? [];
  const evaluation = evaluateMove(correct, move.playerAnswer, config.moveType);
  const pointsEarned = calculateExercisePoints(config.difficulty, evaluation.accuracy);
  const totalAccuracy = state.lastAccuracy * state.completedLessons + evaluation.accuracy;
  const newLessonCount = state.completedLessons + (evaluation.correct ? 1 : 0);
  const averageAccuracy = newLessonCount > 0 ? totalAccuracy / newLessonCount : 0;
  const starRating = calculateStars(averageAccuracy, config.starThresholds);
  const updatedState = {
    completedLessons: newLessonCount,
    completedSequences: state.completedSequences,
    level: state.level,
    streak: state.streak,
    perfectLessons: state.perfectLessons + (evaluation.accuracy >= 0.9 ? 1 : 0),
    threeStarLessons: state.threeStarLessons + (starRating >= 3 ? 1 : 0),
    lastAccuracy: averageAccuracy,
  };
  const newAchievements = evaluateAchievements(updatedState, [], []);
  return { evaluation, pointsEarned, newAchievements, starRating, averageAccuracy, updatedState };
}

// ===== bundle entry =====
window.KoeGame = {
  Koe,
  isSpeechSupported,
  processMove,
  shuffleFisherYates,
  weightedPick,
};
})();</script>

<div class="app">
  <div class="topbar">

  <div id="gamePhase">

<script>
const { Koe, processMove, shuffleFisherYates } = window.KoeGame

const WORDS = [
  { jp: 'すし', es: 'sushi', accepted: ['sushi', 'すし', 'スシ'] },
  { jp: 'さくら', es: 'cerezo en flor', accepted: ['sakura', 'さくら', 'サクラ', '桜'] },
  { jp: 'ふじさん', es: 'monte Fuji', accepted: ['fujisan', 'ふじさん', '富士山'] },
  { jp: 'ありがとう', es: 'gracias', accepted: ['arigatou', 'ありがとう', 'arigato'] },
  { jp: 'こんにちは', es: 'hola', accepted: ['konnichiwa', 'こんにちは', 'konichiwa'] },
  { jp: 'さようなら', es: 'adiós', accepted: ['sayounara', 'さようなら', 'sayonara'] },
  { jp: 'おはよう', es: 'buenos días', accepted: ['ohayou', 'おはよう', 'ohayo'] },
  { jp: 'すみません', es: 'disculpe', accepted: ['sumimasen', 'すみません'] },
  { jp: 'おいしい', es: 'rico/sabroso', accepted: ['oishii', 'おいしい', 'oishī'] },
  { jp: 'かわいい', es: 'bonito/adorable', accepted: ['kawaii', 'かわいい'] },
  { jp: 'せんせい', es: 'profesor', accepted: ['sensei', 'せんせい', '先生'] },
  { jp: 'がくせい', es: 'estudiante', accepted: ['gakusei', 'がくせい', '学生'] },
  { jp: 'でんわ', es: 'teléfono', accepted: ['denwa', 'でんわ', '電話'] },
  { jp: 'ほん', es: 'libro', accepted: ['hon', 'ほん', '本'] },
  { jp: 'みず', es: 'agua', accepted: ['mizu', 'みず', '水'] },
  { jp: 'さかな', es: 'pescado', accepted: ['sakana', 'さかな', '魚'] },
  { jp: 'やま', es: 'montaña', accepted: ['yama', 'やま', '山'] },
  { jp: 'まち', es: 'ciudad', accepted: ['machi', 'まち', '町'] },
  { jp: 'くも', es: 'nube', accepted: ['kumo', 'くも', '雲'] },
  { jp: 'つき', es: 'luna', accepted: ['tsuki', 'つき', '月'] },
]

const words = shuffleFisherYates(WORDS).slice(0, 15)
let index = 0
let totalXP = 0
let totalStars = 0
let unlocked = []
let processing = false

const grid = document.getElementById('wordGrid')
const currentWord = document.getElementById('currentWord')
const currentHint = document.getElementById('currentHint')
const counter = document.getElementById('counter')
const btnListen = document.getElementById('btnListen')
const listeningIndicator = document.getElementById('listeningIndicator')
const interim = document.getElementById('interim')
const feedback = document.getElementById('feedback')
const gameFeedback = document.getElementById('gameFeedback')
const progressFill = document.getElementById('progressFill')
const starCount = document.getElementById('starCount')
const achCount = document.getElementById('achCount')
const xpDisplay = document.getElementById('xpDisplay')
const achPopup = document.getElementById('achPopup')
const achPopupText = document.getElementById('achPopupText')
const gamePhase = document.getElementById('gamePhase')
const resultScreen = document.getElementById('resultScreen')

words.forEach((w, i) => {
  const card = document.createElement('div')
  card.className = 'word-card'
  card.innerHTML = '<span class="word-jp">' + w.jp + '</span><span class="word-es">' + w.es + '</span>'
  grid.appendChild(card)
})

function updateGrid() {
  document.querySelectorAll('.word-card').forEach(function(card, i) {
    card.classList.toggle('is-current', i === index)
    card.classList.toggle('is-correct', i < index)
  })
}

function showWord(i) {
  index = i
  currentWord.textContent = words[i].jp
  currentHint.textContent = '«' + words[i].es + '» — dilo en japonés'
  counter.textContent = 'Palabra ' + (i + 1) + ' de ' + words.length
  feedback.className = 'feedback waiting'
  feedback.textContent = '🎤 Presiona "Escuchar" y di la palabra...'
  gameFeedback.innerHTML = ''
  interim.textContent = ''
  btnListen.disabled = false
  updateGrid()
}

function feedbackClass(level) {
  switch (level) {
    case 'Excelente': return 'excelente'
    case 'Bien': return 'bien'
    case 'Aceptable': return 'aceptable'
    case 'Mejorable': return 'mejorable'
    default: return 'no-reconocido'
  }
}

const koe = new Koe({
  onCaptureComplete: function(candidates) {
    if (processing) return
    processing = true
    const word = words[index]
    const config = {
      difficulty: 3,
      starThresholds: [0, 30, 60],
      accepted: word.accepted,
      moveType: 'speech',
    }
    const state = {
      completedLessons: index,
      completedSequences: 0,
      level: 1, streak: 0,
      perfectLessons: 0, threeStarLessons: 0, lastAccuracy: 0,
    }
    const moveResult = processMove(config, state, { playerAnswer: candidates })
    totalXP += moveResult.pointsEarned
    totalStars = moveResult.starRating

    const correctCount = index + (moveResult.evaluation.correct ? 1 : 0)
    const newAch = []
    if (correctCount >= 1 && unlocked.indexOf('first') === -1) { newAch.push({id:'first',name:'Primer paso',desc:'Primera palabra bien pronunciada'}) }
    if (correctCount >= 5 && unlocked.indexOf('five') === -1) { newAch.push({id:'five',name:'Aprendiz',desc:'5 palabras bien pronunciadas'}) }
    if (correctCount >= 10 && unlocked.indexOf('ten') === -1) { newAch.push({id:'ten',name:'Estudiante',desc:'10 palabras bien pronunciadas'}) }
    newAch.forEach(function(a) { unlocked.push(a.id); showAchievement(a) })

    const level = moveResult.evaluation.feedback
    const cls = feedbackClass(level)
    feedback.className = 'feedback ' + cls
    feedback.textContent = level + ' — puntuación: ' + (moveResult.evaluation.accuracy * 100).toFixed(0) + '%'
    gameFeedback.innerHTML = '<span>+' + moveResult.pointsEarned + ' XP</span><span>⭐ ' + moveResult.starRating + '</span>'
    if (newAch.length) gameFeedback.innerHTML += '<span>🏅 +' + newAch.length + '</span>'
    updateGrid()
    starCount.textContent = totalStars
    achCount.textContent = unlocked.length
    xpDisplay.textContent = totalXP
    progressFill.style.width = ((index + 1) / words.length * 100) + '%'

    btnListen.style.display = 'none'
    document.getElementById('btnNext').style.display = 'inline-flex'
    listeningIndicator.classList.remove('show')

    if (index + 1 >= words.length) {
      document.getElementById('btnNext').textContent = '🎉 Ver resultados'
    }
  },
  onListeningChange: function(listening) {
    if (listening) {
      listeningIndicator.classList.add('show')
      feedback.className = 'feedback waiting'
      feedback.textContent = '🎤 Escuchando... di la palabra'
      interim.textContent = ''
    } else {
      listeningIndicator.classList.remove('show')
    }
  },
  onPermissionDenied: function() {
    feedback.className = 'feedback no-reconocido'
    feedback.textContent = 'Permiso de micrófono denegado. Ve a ajustes del navegador.'
    btnListen.disabled = true
  },
  onNoSpeech: function() {
    intermediate = false
    feedback.className = 'feedback no-reconocido'
    feedback.textContent = 'No se detectó voz. Presiona "Escuchar" e intenta de nuevo.'
    btnListen.disabled = false
  },
  onError: function(err) {
    if (err.type === 'unsupported') {
      feedback.className = 'feedback no-reconocido'
      feedback.textContent = err.message
      btnListen.disabled = true
    }
  },
})

btnListen.addEventListener('click', async function() {
  if (!Koe.isSupported()) {
    feedback.className = 'feedback no-reconocido'
    feedback.textContent = 'SpeechRecognition no disponible. Usa Chrome o Edge.'
    return
  }
  if (!koe.isListening) {
    const granted = await koe.requestMicrophone()
    if (!granted) return
    koe.init()
  }
  koe.listening = true
  btnListen.disabled = true
})

document.getElementById('btnNext').addEventListener('click', function() {
  this.style.display = 'none'
  btnListen.style.display = 'inline-flex'
  processing = false
  if (index + 1 >= words.length) {
    finishLesson()
  } else {
    showWord(index + 1)
  }
})

window.addEventListener('beforeunload', function() {
  if (koe.isListening) koe.destroy()
})

if (!Koe.isSupported()) {
  feedback.className = 'feedback no-reconocido'
  feedback.textContent = '⚠️ SpeechRecognition no disponible. Usa Chrome o Edge.'
}
showWord(0)

function finishLesson() {
  koe.destroy()
  gamePhase.style.display = 'none'
  resultScreen.classList.add('show')
  document.getElementById('rCorrect').textContent = Math.min(index + 1, words.length) + '/' + words.length
  document.getElementById('rStars').textContent = '⭐' + totalStars + '/3'
  document.getElementById('rXP').textContent = totalXP
}

function showAchievement(a) {
  achPopup.querySelector('h4').textContent = '🏅 ' + a.name
  achPopupText.textContent = a.desc
  achPopup.classList.add('show')
  setTimeout(function() { achPopup.classList.remove('show') }, 3000)
}
</script>
</body>
</html>
