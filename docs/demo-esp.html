<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script>(function() {
function shuffleFisherYates(array) {
  const result = [...array];
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

function calculateExercisePoints(difficulty, accuracy) {
  const base = difficulty * 10;
  const multiplier = accuracy >= 0.9 ? 1.5 : 1;
  return Math.round(base * multiplier);
}

function calculateStars(averageAccuracy, thresholds) {
  thresholds = thresholds || [0, 70, 90];
  let stars = 0;
  for (const t of thresholds) {
    if (averageAccuracy * 100 >= t) stars++;
    else break;
  }
  return Math.min(stars, thresholds.length);
}

function findMatch(candidates, accepted) {
  if (candidates.length === 0 || accepted.length === 0) {
    return { matched: false, candidate: null };
  }
  for (const c of candidates) {
    const match = accepted.some((t) => c.transcript.includes(t) || t.includes(c.transcript));
    if (match) {
      return { matched: true, candidate: c };
    }
  }
  return { matched: false, candidate: null };
}

const SPEECH_LEVELS = [
  { threshold: 0.85, level: "Excelente" },
  { threshold: 0.65, level: "Bien" },
  { threshold: 0.45, level: "Aceptable" },
  { threshold: 0.20, level: "Mejorable" },
];
function getSpeechLevel(score) {
  if (score === 0) return "No reconocido";
  for (const l of SPEECH_LEVELS) {
    if (score >= l.threshold) return l.level;
  }
  return "Mejorable";
}

function evaluateSpeech(accepted, candidates) {
  const match = findMatch(candidates, accepted);
  if (!match.matched || !match.candidate) {
    return { score: 0, level: "No reconocido", matchedAt: null, transcript: "" };
  }
  const { candidate } = match;
  const positionScore = 1 - (candidate.position / 5);
  const confidenceScore = candidate.confidence;
  const score = (positionScore * 0.4) + (confidenceScore * 0.6);
  return {
    score,
    level: getSpeechLevel(score),
    matchedAt: candidate.position,
    transcript: candidate.transcript,
  };
}

function processMove(config, state, move) {
  const accepted = config.accepted ?? [];
  const speechResult = evaluateSpeech(Array.isArray(accepted) ? accepted : [accepted], Array.isArray(move.playerAnswer) ? move.playerAnswer : []);
  const evaluation = {
    correct: speechResult.score > 0,
    accuracy: speechResult.score,
    type: "speech",
    feedback: speechResult.level,
  };
  const pointsEarned = calculateExercisePoints(config.difficulty, evaluation.accuracy);
  const totalAccuracy = state.lastAccuracy * state.completedLessons + evaluation.accuracy;
  const newLessonCount = state.completedLessons + (evaluation.correct ? 1 : 0);
  const averageAccuracy = newLessonCount > 0 ? totalAccuracy / newLessonCount : 0;
  const starRating = calculateStars(averageAccuracy, config.starThresholds);
  const updatedState = {
    completedLessons: newLessonCount,
    completedSequences: state.completedSequences,
    level: state.level,
    streak: state.streak,
    perfectLessons: state.perfectLessons + (evaluation.accuracy >= 0.9 ? 1 : 0),
    threeStarLessons: state.threeStarLessons + (starRating >= 3 ? 1 : 0),
    lastAccuracy: averageAccuracy,
  };
  return { evaluation, pointsEarned, starRating, averageAccuracy, updatedState };
}

window.KoeGame = { shuffleFisherYates, processMove };
})();</script>

<script>
const { processMove, shuffleFisherYates } = window.KoeGame

const WORDS = [
  { jp: 'すし', es: 'sushi', accepted: ['sushi', 'すし', 'スシ'] },
  { jp: 'さくら', es: 'cerezo en flor', accepted: ['sakura', 'さくら', 'サクラ', '桜'] },
  { jp: 'ふじさん', es: 'monte Fuji', accepted: ['fujisan', 'ふじさん', '富士山'] },
  { jp: 'ありがとう', es: 'gracias', accepted: ['arigatou', 'ありがとう', 'arigato'] },
  { jp: 'こんにちは', es: 'hola', accepted: ['konnichiwa', 'こんにちは', 'konichiwa'] },
  { jp: 'さようなら', es: 'adiós', accepted: ['sayounara', 'さようなら', 'sayonara'] },
  { jp: 'おはよう', es: 'buenos días', accepted: ['ohayou', 'おはよう', 'ohayo'] },
  { jp: 'すみません', es: 'disculpe', accepted: ['sumimasen', 'すみません'] },
  { jp: 'おいしい', es: 'rico/sabroso', accepted: ['oishii', 'おいしい', 'oishī'] },
  { jp: 'かわいい', es: 'bonito/adorable', accepted: ['kawaii', 'かわいい'] },
  { jp: 'せんせい', es: 'profesor', accepted: ['sensei', 'せんせい', '先生'] },
  { jp: 'がくせい', es: 'estudiante', accepted: ['gakusei', 'がくせい', '学生'] },
  { jp: 'でんわ', es: 'teléfono', accepted: ['denwa', 'でんわ', '電話'] },
  { jp: 'ほん', es: 'libro', accepted: ['hon', 'ほん', '本'] },
  { jp: 'みず', es: 'agua', accepted: ['mizu', 'みず', '水'] },
  { jp: 'さかな', es: 'pescado', accepted: ['sakana', 'さかな', '魚'] },
  { jp: 'やま', es: 'montaña', accepted: ['yama', 'やま', '山'] },
  { jp: 'まち', es: 'ciudad', accepted: ['machi', 'まち', '町'] },
  { jp: 'くも', es: 'nube', accepted: ['kumo', 'くも', '雲'] },
  { jp: 'つき', es: 'luna', accepted: ['tsuki', 'つき', '月'] },
]

const FUSE_DURATION = 15
let _fuseRaf = null
let _fuseStart = 0
let _fuseActive = false
let _autoMic = false
let _paused = false
let _autoListenTimer = null

const words = shuffleFisherYates(WORDS).slice(0, 15)
let index = 0
let totalXP = 0
let unlocked = []
let processing = false
const results = words.map(function() { return { status: 'pending' } })
let playerState = {
  completedLessons: 0, completedSequences: 0, level: 1, streak: 0,
  perfectLessons: 0, threeStarLessons: 0, lastAccuracy: 0,
}

/* DOM refs */
const grid = document.getElementById('wordGrid')
const cardWord = document.getElementById('cardWord')
const cardMeaning = document.getElementById('cardMeaning')
const cardHint = document.getElementById('cardHint')
const micBtn = document.getElementById('micBtn')
const micLabel = document.getElementById('micLabel')
const wave = document.getElementById('wave')
const feedbackBar = document.getElementById('feedbackBar')
const gameFeedback = document.getElementById('gameFeedback')
const progressFill = document.getElementById('progressFill')
const fuseBurned = document.getElementById('fuseBurned')
const fuseTime = document.getElementById('fuseTime')
const correctCount = document.getElementById('correctCount')
const errorsCount = document.getElementById('errorsCount')
const remainingCount = document.getElementById('remainingCount')
const scoreBadge = document.getElementById('scoreBadge')
const achPopup = document.getElementById('achPopup')
const achPopupText = document.getElementById('achPopupText')
const gameArea = document.getElementById('gameArea')
const resultScreen = document.getElementById('resultScreen')

/* Build grid */
words.forEach(function(w, i) {
  var card = document.createElement('div')
  card.className = 'word-card is-pending'
  card.innerHTML = '<span class="word-jp">' + w.jp + '</span><span class="word-es">' + w.es + '</span>'
  grid.appendChild(card)
})

function updateGrid() {
  document.querySelectorAll('.word-card').forEach(function(card, i) {
    card.className = 'word-card ' + results[i].status
    if (i === index && results[i].status === 'pending') {
      card.className = 'word-card is-current'
    }
  })
}

function updateStats() {
  var done = 0
  var correct = 0
  results.forEach(function(r) {
    if (r.status === 'correct' || r.status === 'wrong') done++
    if (r.status === 'correct') correct++
  })
  correctCount.textContent = correct
  errorsCount.textContent = done - correct
  remainingCount.textContent = words.length - index
  scoreBadge.textContent = done > 0 ? 'Puntuación: ' + (correct - (done - correct)) : 'Puntuación: —'
}

function showFeedback(msg, type) {
  feedbackBar.textContent = msg
  feedbackBar.className = 'feedback-bar visible ' + type
}

function hideFeedback() {
  feedbackBar.className = 'feedback-bar'
}

/* Fuse */
function startFuse() {
  if (_fuseActive) return
  _fuseActive = true
  _fuseStart = Date.now()
  var burned = document.getElementById('fuseBurned')
  var timeEl = document.getElementById('fuseTime')
  function tick() {
    if (!_fuseActive) return
    var elapsed = (Date.now() - _fuseStart) / 1000
    var remaining = Math.max(0, FUSE_DURATION - elapsed)
    var pct = Math.min(100, (elapsed / FUSE_DURATION) * 100)
    burned.style.width = pct + '%'
    timeEl.textContent = Math.ceil(remaining)
    if (remaining > 0) {
      _fuseRaf = requestAnimationFrame(tick)
    }
  }
  _fuseRaf = requestAnimationFrame(tick)
}

function stopFuse() {
  _fuseActive = false
  if (_fuseRaf) { cancelAnimationFrame(_fuseRaf); _fuseRaf = null }
}

function resetFuse() {
  stopFuse()
  fuseBurned.style.width = '0%'
  fuseTime.textContent = FUSE_DURATION
}

function showWord(i) {
  index = i
  cardWord.textContent = words[i].jp
  cardMeaning.textContent = '«' + words[i].es + '»'
  cardHint.textContent = 'Dilo en japonés'
  hideFeedback()
  gameFeedback.innerHTML = ''
  processing = false
  updateGrid()
  updateStats()
  progressFill.style.width = (i / words.length * 100) + '%'
}

function feedbackClass(level) {
  switch (level) {
    case 'Excelente': return 'excelente'
    case 'Bien': return 'bien'
    case 'Aceptable': return 'aceptable'
    case 'Mejorable': return 'mejorable'
    default: return 'no-reconocido'
  }
}

function retryListen() {
  if (index >= words.length) return
  resetFuse(); startFuse()
  setTimeout(function() {
    if (!_paused && _autoMic) startListening()
  }, 600)
}

function startListening() {
  if (index >= words.length) return
  if (processing) return
  if (!koe || !koe.isSupported()) return
  if (koe.getListening()) return
  if (_paused) return

  koe.listen(function(candidates) {
    micBtn.classList.remove('listening')
    wave.classList.remove('active')
    if (index >= words.length) return
    if (processing) return
    if (candidates.length === 0) { retryListen(); return }
    processing = true
    stopFuse()

    var word = words[index]
    var config = {
      difficulty: 3,
      starThresholds: [0, 30, 60],
      accepted: word.accepted,
      moveType: 'speech',
    }
    var moveResult = processMove(config, playerState, { playerAnswer: candidates })
    playerState = moveResult.updatedState
    totalXP += moveResult.pointsEarned

    var level = moveResult.evaluation.feedback
    var cls = feedbackClass(level)
    showFeedback(level + ' — ' + (moveResult.evaluation.accuracy * 100).toFixed(0) + '%', cls)
    gameFeedback.innerHTML = '<span>+' + moveResult.pointsEarned + ' XP</span><span>⭐ ' + moveResult.starRating + '</span>'

    if (moveResult.evaluation.correct) {
      results[index].status = 'correct'
      micBtn.className = 'mic-btn correct'
    } else {
      results[index].status = 'wrong'
      micBtn.className = 'mic-btn wrong'
    }
    updateGrid()
    updateStats()
    progressFill.style.width = ((index + 1) / words.length * 100) + '%'

    /* Achievements */
    var correct = results.filter(function(r) { return r.status === 'correct' }).length
    if (correct >= 1 && unlocked.indexOf('first') === -1) { unlocked.push('first'); showAchievement({id:'first',name:'Primer paso',desc:'Primera palabra bien pronunciada'}) }
    if (correct >= 5 && unlocked.indexOf('five') === -1) { unlocked.push('five'); showAchievement({id:'five',name:'Aprendiz',desc:'5 palabras bien pronunciadas'}) }
    if (correct >= 10 && unlocked.indexOf('ten') === -1) { unlocked.push('ten'); showAchievement({id:'ten',name:'Estudiante',desc:'10 palabras bien pronunciadas'}) }

    /* Auto-advance after 2s */
    _autoListenTimer = setTimeout(function() {
      if (index + 1 >= words.length) {
        finishLesson()
      } else {
        showWord(index + 1)
        resetFuse()
        startFuse()
        setTimeout(startListening, 300)
      }
    }, 2000)
  }, function(listening) {
    micBtn.classList.toggle('listening', listening)
    wave.classList.toggle('active', listening)
  }, retryListen)
}

/* Mic button */
micBtn.addEventListener('click', function() {
  if (!_autoMic) {
    if (_autoListenTimer) { clearTimeout(_autoListenTimer); _autoListenTimer = null }
    _autoMic = true
    micLabel.classList.add('hidden')
    hideFeedback()
    resetFuse()
    startFuse()
    setTimeout(startListening, 300)
    return
  }
  _paused = !_paused
  if (_paused) {
    stopFuse()
    if (koe) koe.cancel()
    micBtn.classList.remove('listening')
    wave.classList.remove('active')
    micBtn.className = 'mic-btn'
    showFeedback('Práctica pausada', 'aceptable')
  } else {
    if (_autoListenTimer) { clearTimeout(_autoListenTimer); _autoListenTimer = null }
    hideFeedback()
    resetFuse()
    startFuse()
    setTimeout(startListening, 300)
  }
})

var koe = window.Koe
if (!koe || !koe.isSupported()) {
  micBtn.style.display = 'none'
}

/* Restart */
document.getElementById('restartBtn').addEventListener('click', function() {
  location.reload()
})

showWord(0)

/* Results */
function finishLesson() {
  _autoMic = false
  if (koe) koe.cancel()
  stopFuse()
  gameArea.style.display = 'none'
  resultScreen.classList.add('show')
  var correct = results.filter(function(r) { return r.status === 'correct' }).length
  var total = words.length
  document.getElementById('rCorrect').textContent = correct + '/' + total
  document.getElementById('rStars').textContent = '⭐' + playerState.threeStarLessons + '/3'
  document.getElementById('rXP').textContent = totalXP
}

function showAchievement(a) {
  achPopup.querySelector('h4').textContent = '🏅 ' + a.name
  achPopupText.textContent = a.desc
  achPopup.classList.add('show')
  setTimeout(function() { achPopup.classList.remove('show') }, 3000)
}
</script>
</body>
</html>
