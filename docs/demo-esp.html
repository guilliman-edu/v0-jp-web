<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koe + Game — demo de pronunciación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="koe-bundle.js"></script>
<script>(function() {
// ===== packages/common-api/src/speech/recognition.ts =====
const DEFAULT_CONFIG = {
  lang: "ja-JP",
  continuous: true,
  interimResults: true,
  maxAlternatives: 5,
};
function getSpeechRecognition() {
  if (typeof window === "undefined") return undefined;
  return window.SpeechRecognition || window.webkitSpeechRecognition;
}
function isSpeechSupported() {
  return getSpeechRecognition() !== undefined;
}
function createRecognizer(config = {}, callback) {
  const SR = getSpeechRecognition();
  if (!SR) {
    callback({ kind: "error", data: { type: "unsupported", message: "SpeechRecognition API no está disponible en este navegador" } });
    return { start() {}, stop() {}, abort() {} };
  }
  const recognition = new SR();
  const cfg = { ...DEFAULT_CONFIG, ...config };
  recognition.lang = cfg.lang;
  recognition.continuous = cfg.continuous;
  recognition.interimResults = cfg.interimResults;
  recognition.maxAlternatives = cfg.maxAlternatives;
  recognition.onresult = (event) => {
    const result = event.results[event.resultIndex];
    const alternatives = Array.from(result).map((alt) => ({
      transcript: alt.transcript, confidence: alt.confidence
    }));
    callback({ kind: "result", data: { alternatives, isFinal: result.isFinal } });
  };
  recognition.onerror = (event) => {
    let type;
    switch (event.error) {
      case "no-speech": type = "no-speech"; break;
      case "not-allowed": type = "not-allowed"; break;
      case "network": type = "network"; break;
      default: type = "network";
    }
    callback({ kind: "error", data: { type, message: event.message || event.error } });
  };
  recognition.onend = () => { callback({ kind: "end" }); };
  return {
    start() { recognition.start(); },
    stop() { recognition.stop(); },
    abort() { recognition.abort(); },
  };
}

// ===== packages/common-api/src/speech/normalize.ts =====
function findMatch(candidates, accepted) {
  if (candidates.length === 0 || accepted.length === 0) {
    return { matched: false, candidate: null };
  }
  for (const c of candidates) {
    const match = accepted.some((t) => c.transcript.includes(t) || t.includes(c.transcript));
    if (match) {
      return { matched: true, candidate: c };
    }
  }
  return { matched: false, candidate: null };
}

// ===== packages/game/src/score.ts =====
function calculateExercisePoints(difficulty, accuracy) {
  const base = difficulty * 10;
  const multiplier = accuracy >= 0.9 ? 1.5 : 1;
  return Math.round(base * multiplier);
}

// ===== packages/game/src/achievements.ts =====
function calculateStars(averageAccuracy, thresholds = [0, 70, 90]) {
  let stars = 0;
  for (const t of thresholds) {
    if (averageAccuracy * 100 >= t) stars++;
    else break;
  }
  return Math.min(stars, thresholds.length);
}
function evaluateAchievements(playerState, achievements, unlockedIds) {
  return achievements.filter(
    (a) => !unlockedIds.includes(a.id) && a.condition(playerState)
  );
}

// ===== packages/game/src/evaluate.ts =====
const SPEECH_LEVELS = [
  { threshold: 0.85, level: "Excelente" },
  { threshold: 0.65, level: "Bien" },
  { threshold: 0.45, level: "Aceptable" },
  { threshold: 0.20, level: "Mejorable" },
];
function getSpeechLevel(score) {
  if (score === 0) return "No reconocido";
  for (const l of SPEECH_LEVELS) {
    if (score >= l.threshold) return l.level;
  }
  return "Mejorable";
}
function normalize(text) { return text.trim().toLowerCase(); }
function evaluateSpeech(accepted, candidates) {
  const match = findMatch(candidates, accepted);
  if (!match.matched || !match.candidate) {
    return { score: 0, level: "No reconocido", matchedAt: null, transcript: "" };
  }
  const { candidate } = match;
  const positionScore = 1 - (candidate.position / 5);
  const confidenceScore = candidate.confidence;
  const score = (positionScore * 0.4) + (confidenceScore * 0.6);
  return {
    score,
    level: getSpeechLevel(score),
    matchedAt: candidate.position,
    transcript: candidate.transcript,
  };
}
function evaluateMove(correct, playerAnswer, type) {
  switch (type) {
    case "speech": {
      const speechResult = evaluateSpeech(Array.isArray(correct) ? correct : [correct], Array.isArray(playerAnswer) ? playerAnswer : []);
      return {
        correct: speechResult.score > 0,
        accuracy: speechResult.score,
        type: "speech",
        feedback: speechResult.level,
      };
    }
  }
}
function processMove(config, state, move) {
  const correct = config.accepted ?? [];
  const evaluation = evaluateMove(correct, move.playerAnswer, config.moveType);
  const pointsEarned = calculateExercisePoints(config.difficulty, evaluation.accuracy);
  const totalAccuracy = state.lastAccuracy * state.completedLessons + evaluation.accuracy;
  const newLessonCount = state.completedLessons + (evaluation.correct ? 1 : 0);
  const averageAccuracy = newLessonCount > 0 ? totalAccuracy / newLessonCount : 0;
  const starRating = calculateStars(averageAccuracy, config.starThresholds);
  const updatedState = {
    completedLessons: newLessonCount,
    completedSequences: state.completedSequences,
    level: state.level,
    streak: state.streak,
    perfectLessons: state.perfectLessons + (evaluation.accuracy >= 0.9 ? 1 : 0),
    threeStarLessons: state.threeStarLessons + (starRating >= 3 ? 1 : 0),
    lastAccuracy: averageAccuracy,
  };
  return { evaluation, pointsEarned, starRating, averageAccuracy, updatedState };
}

// ===== packages/game/src/random.ts =====
function shuffleFisherYates(array) {
  const result = [...array];
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

// ===== bundle entry =====
window.KoeGame = {
  isSpeechSupported,
  processMove,
  shuffleFisherYates,
  evaluateSpeech,
};
})();</script>

}

/* action buttons */

}

  background: #3b82f6; color: white;
}

  font-size: 0.9rem; min-height: 3rem;
}

.feedback.aceptable { background: #422006; color: #fde68a; border: 1px solid #854d0e; }
.feedback.mejorable, .feedback.no-reconocido { background: #450a0a; color: #fca5a5; border: 1px solid #991b1b; }
.feedback.waiting { background: #1e293b; color: #64748b; border: 1px dashed #334155; }
.game-feedback {
  display: flex; gap: 1rem; justify-content: center; margin-top: 0.75rem; font-size: 0.85rem;
}
.game-feedback span { display: flex; align-items: center; gap: 0.25rem; }

/* achievement popup */
.achievement-popup {

}

@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.result-screen.show { display: block; }

.result-stats {

}

.result-stat .value { font-size: 1.5rem; font-weight: 700; }
.result-stat .label { font-size: 0.8rem; color: #94a3b8; }
</style>

<div class="app">
  <div class="topbar">
    <h1>Koe + Game</h1>
    <div class="topbar-stats">
      <span>⭐ <strong id="starCount">0</strong></span>
      <span>🎯 <strong id="correctBadge">0/0</strong></span>
      <span>🔥 <strong id="xpDisplay">0</strong> XP</span>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="word-grid" id="wordGrid"></div>

  <div id="gamePhase">
    <div class="speech-area">
      <div class="counter" id="counter">Palabra 1 de 15</div>
      <h2 id="currentWord">—</h2>
      <p class="hint" id="currentHint">Preparando...</p>

      <div class="btn-row">
        <button class="mic-btn" id="micBtn" title="Habla en japonés">🎤<span class="wave" id="wave"><span></span><span></span><span></span><span></span><span></span></span></button>
        <button class="btn btn-next" id="btnNext" style="display:none">Siguiente →</button>
      </div>

      <div class="feedback waiting" id="feedback">Presiona el micrófono y di la palabra en japonés</div>
      <div class="game-feedback" id="gameFeedback"></div>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <h2>🎉 ¡Lección completada!</h2>

      <div class="result-stat"><div class="value" id="rCorrect">0/15</div><div class="label">Aciertos</div></div>
      <div class="result-stat"><div class="value" id="rStars">⭐0</div><div class="label">Estrellas</div></div>
      <div class="result-stat"><div class="value" id="rXP">0</div><div class="label">XP ganados</div></div>
    </div>
    <div style="text-align:center">
      <button class="btn btn-primary" onclick="location.reload()">🔄 Repetir</button>
    </div>
  </div>

  <div class="achievement-popup" id="achPopup">
    <h4>🏅 ¡Logro desbloqueado!</h4>
    <p id="achPopupText"></p>
  </div>
</div>

<script>
const { processMove, shuffleFisherYates } = window.KoeGame

const WORDS = [
  { jp: 'すし', es: 'sushi', accepted: ['sushi', 'すし', 'スシ'] },
  { jp: 'さくら', es: 'cerezo en flor', accepted: ['sakura', 'さくら', 'サクラ', '桜'] },
  { jp: 'ふじさん', es: 'monte Fuji', accepted: ['fujisan', 'ふじさん', '富士山'] },
  { jp: 'ありがとう', es: 'gracias', accepted: ['arigatou', 'ありがとう', 'arigato'] },
  { jp: 'こんにちは', es: 'hola', accepted: ['konnichiwa', 'こんにちは', 'konichiwa'] },
  { jp: 'さようなら', es: 'adiós', accepted: ['sayounara', 'さようなら', 'sayonara'] },
  { jp: 'おはよう', es: 'buenos días', accepted: ['ohayou', 'おはよう', 'ohayo'] },
  { jp: 'すみません', es: 'disculpe', accepted: ['sumimasen', 'すみません'] },
  { jp: 'おいしい', es: 'rico/sabroso', accepted: ['oishii', 'おいしい', 'oishī'] },
  { jp: 'かわいい', es: 'bonito/adorable', accepted: ['kawaii', 'かわいい'] },
  { jp: 'せんせい', es: 'profesor', accepted: ['sensei', 'せんせい', '先生'] },
  { jp: 'がくせい', es: 'estudiante', accepted: ['gakusei', 'がくせい', '学生'] },
  { jp: 'でんわ', es: 'teléfono', accepted: ['denwa', 'でんわ', '電話'] },
  { jp: 'ほん', es: 'libro', accepted: ['hon', 'ほん', '本'] },
  { jp: 'みず', es: 'agua', accepted: ['mizu', 'みず', '水'] },
  { jp: 'さかな', es: 'pescado', accepted: ['sakana', 'さかな', '魚'] },
  { jp: 'やま', es: 'montaña', accepted: ['yama', 'やま', '山'] },
  { jp: 'まち', es: 'ciudad', accepted: ['machi', 'まち', '町'] },
  { jp: 'くも', es: 'nube', accepted: ['kumo', 'くも', '雲'] },
  { jp: 'つき', es: 'luna', accepted: ['tsuki', 'つき', '月'] },
]

const koe = window.Koe

/* --- Game state --- */
const words = shuffleFisherYates(WORDS).slice(0, 15)
let index = 0
let totalXP = 0
let unlocked = []
let processing = false

/* Per-word result tracking for the grid */
const results = words.map(() => ({ status: 'pending' }))
/* Player state for processMove accumulation */
let playerState = {
  completedLessons: 0,
  completedSequences: 0,
  level: 1,
  streak: 0,
  perfectLessons: 0,
  threeStarLessons: 0,
  lastAccuracy: 0,
}

/* --- DOM refs --- */
const grid = document.getElementById('wordGrid')
const currentWord = document.getElementById('currentWord')
const currentHint = document.getElementById('currentHint')
const counter = document.getElementById('counter')
const micBtn = document.getElementById('micBtn')
const btnNext = document.getElementById('btnNext')
const wave = document.getElementById('wave')
const feedback = document.getElementById('feedback')
const gameFeedback = document.getElementById('gameFeedback')
const progressFill = document.getElementById('progressFill')
const starCount = document.getElementById('starCount')
const correctBadge = document.getElementById('correctBadge')
const xpDisplay = document.getElementById('xpDisplay')
const achPopup = document.getElementById('achPopup')
const achPopupText = document.getElementById('achPopupText')
const gamePhase = document.getElementById('gamePhase')
const resultScreen = document.getElementById('resultScreen')

/* --- Build grid --- */
words.forEach((w, i) => {
  const card = document.createElement('div')
  card.className = 'word-card is-pending'
  card.innerHTML = '<span class="word-jp">' + w.jp + '</span><span class="word-es">' + w.es + '</span>'
  grid.appendChild(card)
})

function updateGrid() {
  document.querySelectorAll('.word-card').forEach((card, i) => {
    card.className = 'word-card ' + results[i].status
    if (i === index && results[i].status === 'pending') {
      card.className = 'word-card is-current'
    }
  })
}

function showWord(i) {
  index = i
  currentWord.textContent = words[i].jp
  currentHint.textContent = '«' + words[i].es + '» — dilo en japonés'
  counter.textContent = 'Palabra ' + (i + 1) + ' de ' + words.length
  feedback.className = 'feedback waiting'
  feedback.textContent = '🎤 Presiona el micrófono y di la palabra'
  gameFeedback.innerHTML = ''
  micBtn.disabled = false
  btnNext.style.display = 'none'
  processing = false
  updateGrid()
}

function feedbackClass(level) {
  switch (level) {
    case 'Excelente': return 'excelente'
    case 'Bien': return 'bien'
    case 'Aceptable': return 'aceptable'
    case 'Mejorable': return 'mejorable'
    default: return 'no-reconocido'
  }
}

function updateStats() {
  const done = results.filter(r => r.status === 'correct' || r.status === 'wrong')
  const correct = results.filter(r => r.status === 'correct').length
  correctBadge.textContent = correct + '/' + done.length
}

/* --- Process speech result --- */
function onSpeechResult(candidates) {
  if (processing) return
  processing = true

  const word = words[index]
  const config = {
    difficulty: 3,
    starThresholds: [0, 30, 60],
    accepted: word.accepted,
    moveType: 'speech',
  }
  const moveResult = processMove(config, playerState, { playerAnswer: candidates })
  playerState = moveResult.updatedState
  totalXP += moveResult.pointsEarned

  const level = moveResult.evaluation.feedback
  const cls = feedbackClass(level)
  feedback.className = 'feedback ' + cls
  feedback.textContent = level + ' — ' + (moveResult.evaluation.accuracy * 100).toFixed(0) + '%'

  gameFeedback.innerHTML = '<span>+' + moveResult.pointsEarned + ' XP</span><span>⭐ ' + moveResult.starRating + '</span>'

  /* Mark word result */
  if (moveResult.evaluation.correct) {
    results[index].status = 'correct'
  } else {
    results[index].status = 'wrong'
  }

  /* Achievements */
  const correctCount = results.filter(r => r.status === 'correct').length
  const newAch = []
  if (correctCount >= 1 && unlocked.indexOf('first') === -1) { newAch.push({id:'first',name:'Primer paso',desc:'Primera palabra bien pronunciada'}) }
  if (correctCount >= 5 && unlocked.indexOf('five') === -1) { newAch.push({id:'five',name:'Aprendiz',desc:'5 palabras bien pronunciadas'}) }
  if (correctCount >= 10 && unlocked.indexOf('ten') === -1) { newAch.push({id:'ten',name:'Estudiante',desc:'10 palabras bien pronunciadas'}) }
  newAch.forEach(function(a) { unlocked.push(a.id); showAchievement(a) })

  updateGrid()
  updateStats()
  starCount.textContent = moveResult.starRating
  xpDisplay.textContent = totalXP
  progressFill.style.width = ((index + 1) / words.length * 100) + '%'

  micBtn.style.display = 'none'
  btnNext.style.display = 'inline-flex'
  if (index + 1 >= words.length) {
    btnNext.textContent = '🎉 Ver resultados'
  } else {
    btnNext.textContent = 'Siguiente →'
  }
}

/* --- Koe integration --- */
if (koe && koe.isSupported()) {
  micBtn.addEventListener('click', () => {
    if (koe.getListening()) { koe.cancel(); micBtn.classList.remove('listening'); wave.classList.remove('active'); return }
    if (processing) return
    koe.listen(
      (candidates) => {
        micBtn.classList.remove('listening')
        wave.classList.remove('active')
        onSpeechResult(candidates)
      },
      (listening) => {
        micBtn.classList.toggle('listening', listening)
        wave.classList.toggle('active', listening)
      },
      () => {
        micBtn.classList.remove('listening')
        wave.classList.remove('active')
        if (!processing) {
          feedback.className = 'feedback no-reconocido'
          feedback.textContent = 'No se detectó voz. Presiona el micrófono e intenta de nuevo.'
          micBtn.disabled = false
        }
      }
    )
  })
} else {
  micBtn.style.display = 'none'
  feedback.className = 'feedback no-reconocido'
  feedback.textContent = '⚠️ SpeechRecognition no disponible. Usa Chrome o Edge.'
}

/* --- Next button --- */
btnNext.addEventListener('click', function() {
  this.style.display = 'none'
  micBtn.style.display = 'inline-flex'
  processing = false
  if (index + 1 >= words.length) {
    finishLesson()
  } else {
    showWord(index + 1)
  }
})

showWord(0)

/* --- Results --- */
function finishLesson() {
  gamePhase.style.display = 'none'
  resultScreen.classList.add('show')
  const correct = results.filter(r => r.status === 'correct').length
  const total = words.length
  document.getElementById('rCorrect').textContent = correct + '/' + total
  document.getElementById('rStars').textContent = '⭐' + playerState.starRating + '/3'
  document.getElementById('rXP').textContent = totalXP
}

function showAchievement(a) {
  achPopup.querySelector('h4').textContent = '🏅 ' + a.name
  achPopupText.textContent = a.desc
  achPopup.classList.add('show')
  setTimeout(function() { achPopup.classList.remove('show') }, 3000)
}
</script>
</body>
