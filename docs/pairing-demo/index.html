<!DOCTYPE html>
<html lang="es">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: #f8fafc;
  color: #1e293b;
  min-height: 100vh;
}
.topbar {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem 1rem;
  background: white; border-bottom: 1px solid #e2e8f0;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  position: sticky; top: 0; z-index: 30;
}
.topbar-title { font-size: 1rem; font-weight: 700; color: #0f172a; }
.topbar-level {
  font-size: 0.75rem; font-weight: 600;
  background: #dbeafe; color: #1d4ed8;
  padding: 0.125rem 0.5rem; border-radius: 9999px;
}
.topbar-spacer { flex: 1; }
.score-badge {
  font-size: 0.8rem; font-weight: 600;
  background: #f1f5f9; color: #475569;
  padding: 0.25rem 0.75rem; border-radius: 9999px;
}
.main-content {
  padding: 1.5rem 1rem; max-width: 56rem; margin: 0 auto;
}
.game-header {
  text-align: center; margin-bottom: 1.5rem;
}
.game-header h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
.game-header p { font-size: 0.85rem; color: #64748b; }
.game-status {
  display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.25rem;
}
.stat-box {
  text-align: center;
}
.stat-value {
  font-size: 1.5rem; font-weight: 700; color: #0f172a;
}
.stat-label {
  font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;
}
.board {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 2rem; max-width: 48rem; margin: 0 auto;
}
.column {
  background: white; border: 1px solid #e2e8f0;
  border-radius: 1rem; padding: 1rem;
}
.column h2 {
  font-size: 0.85rem; font-weight: 600; color: #64748b;
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 0.75rem; text-align: center;
  padding-bottom: 0.5rem; border-bottom: 1px solid #f1f5f9;
}
.column-items {
  display: flex; flex-direction: column; gap: 0.5rem;
  min-height: 200px;
}
.item {
  padding: 0.75rem 1rem;
  border: 2px solid #e2e8f0;
  border-radius: 0.75rem;
  background: #fafbfc;
  cursor: pointer;
  font-size: 0.95rem;
  touch-action: manipulation;
  transition: all 0.2s ease;
  user-select: none;
  text-align: center;
}
.item:hover { border-color: #93c5fd; background: #eff6ff; }
.item.selected {
  border-color: #3b82f6;
  background: #dbeafe;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.3);
}
.item.matched {
  border-color: #d1fae5;
  background: #f0fdf4;
  cursor: default;
  color: #6b7280;
}
.item.wrong {
  border-color: #ef4444;
  background: #fef2f2;
  animation: shake 0.4s ease;
}
.item.jp { font-family: 'Noto Sans JP', sans-serif; font-size: 1.1rem; }
.item.es { font-size: 0.95rem; }
.item .error-badge {
  position: absolute;
  bottom: -4px;
  right: -4px;
  background: #dc2626;
  color: #fff;
  font-size: 0.7rem;
  font-weight: 800;
  width: 1.35rem;
  height: 1.35rem;
  line-height: 1.35rem;
  text-align: center;
  border-radius: 50%;
  z-index: 10;
  box-shadow: 0 2px 6px rgba(220,38,38,0.5);
  border: 2px solid #fff;
  pointer-events: none;
}
.item { min-height: 4rem; height: 4rem; display: flex; align-items: center; justify-content: center; position: relative; }
.item ruby { display: inline-flex; flex-direction: column; align-items: center; line-height: 1.1; }
.item rt { font-size: 0.65rem; color: #64748b; line-height: 1; }
.item.dragging { opacity: 0.4; }
.item.drag-over { border-color: #3b82f6; background: #dbeafe; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.feedback-bar {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  border-radius: 0.75rem;
  text-align: center;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  opacity: 0;
}
.feedback-bar.visible { opacity: 1; }
.feedback-bar.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.feedback-bar.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.feedback-bar.done { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
.reiniciar-btn {
  display: block; margin: 1.5rem auto 0;
  padding: 0.625rem 1.5rem;
  background: #3b82f6; color: white; border: none;
  border-radius: 0.75rem; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.reiniciar-btn:hover { background: #2563eb; }
.victory-screen {

  text-align: center; padding: 2rem;
}
.victory-screen.visible { display: block; }
.victory-screen h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.victory-screen p { font-size: 1rem; color: #475569; margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="topbar">

  <span class="score-badge" id="scoreBadge">Puntuación: —</span>

  </div>

    </div>

/* ===========================================================
   SeededRandom (from @maquinaria/game)
   =========================================================== */
class SeededRandom {
  constructor(seed) {
    this.state = new Uint32Array(4)
    this.state[0] = seed >>> 0
    this.state[1] = (seed * 1812433253 + 1) >>> 0
    this.state[2] = (this.state[1] * 1812433253 + 1) >>> 0
    this.state[3] = (this.state[2] * 1812433253 + 1) >>> 0
  }
  next() {
    const s = new Uint32Array(this.state)
    const result = Math.imul(s[1] * 5, 1) << 7 | (s[1] * 5) >>> 25
    const t = s[1] << 9 | s[2] >>> 23
    s[2] ^= s[0]; s[3] ^= s[1]; s[1] ^= s[2]; s[0] ^= s[3]; s[2] ^= t
    s[3] = (s[3] << 11 | s[3] >>> 21) >>> 0
    this.state = s
    return (result >>> 0) / 4294967296
  }
  shuffle(array) {
    const result = [...array]
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(this.next() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]]
    }
    return result
  }
}

/* ===========================================================
   Main game logic
   =========================================================== */
const activity = _LECTURA_BUNDLE[0]
const pool = activity.data.palabras
const dificultad = activity.data.dificultad || 'medio'
const ROUND_SIZE = Math.min(10, pool.length)

// Build vocab index: literal -> { significado, lectura }
const vocabIndex = {}
for (const r of _GOI_BUNDLE) {
  if (r.data && r.data.literal) {
    vocabIndex[r.data.literal] = r.data
  }
}

let state = {
  pairs: [],
  errors: 0,
  paired: new Set(),
  pairErrors: {},
  active: false,
}

function startRound() {
  const rng = new SeededRandom(Date.now())
  const selected = rng.shuffle(pool).slice(0, ROUND_SIZE)

  state.pairs = selected.map((literal, i) => {
    const data = vocabIndex[literal]
    return {
      literal,
      significado: data ? data.significado : '???',
      lectura: data ? data.lectura : '',
      pairId: i,
    }
  })
  state.errors = 0
  state.paired = new Set()
  state.pairErrors = {}
  state.active = true

  document.getElementById('victoryScreen').classList.remove('visible')
  document.getElementById('board').style.display = 'grid'
  document.getElementById('reiniciarBtn').textContent = 'Nueva ronda'

  renderBoard()
  updateStats()
  hideFeedback()
}

function jpLabel(item) {
  if (dificultad === 'facil') return item.lectura || item.literal
  if (dificultad === 'dificil') return item.literal
  return item.lectura
    ? `<ruby>${item.literal}<rt>${item.lectura}</rt></ruby>`
    : item.literal
}

function renderBoard() {
  const esContainer = document.getElementById('esItems')
  const jpContainer = document.getElementById('jpItems')

  // Shuffle each column independently
  const rng = new SeededRandom(Date.now() + 1)
  const esItems = rng.shuffle(state.pairs.map(p => ({
    literal: p.literal,
    significado: p.significado,
  })))
  const jpItems = rng.shuffle(state.pairs.map(p => ({
    literal: p.literal,
    significado: p.significado,
    lectura: p.lectura,
  })))

  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0

  esContainer.innerHTML = esItems.map(item => {
    const paired = state.paired.has(item.literal)
    const attrs = paired ? '' : isTouch
      ? `onclick="onItemClick(event)"`
      : `draggable="true" ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"`
    return `<div class="item es ${paired ? 'matched' : ''}"
                data-literal="${item.literal}"
                data-side="es"
                data-significado="${item.significado}"
                ${attrs}>
      ${item.significado}
    </div>`
  }).join('')

  jpContainer.innerHTML = jpItems.map(item => {
    const paired = state.paired.has(item.literal)
    const label = jpLabel(item)
    const attrs = paired ? '' : isTouch
      ? `onclick="onItemClick(event)"`
      : `draggable="true" ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"`
    return `<div class="item jp ${paired ? 'matched' : ''}"
                data-literal="${item.literal}"
                data-side="jp"
                data-significado="${item.significado}"
                ${attrs}>
      ${label}
    </div>`
  }).join('')
}

function updateStats() {
  document.getElementById('pairedCount').textContent = state.paired.size
  document.getElementById('errorsCount').textContent = state.errors
  document.getElementById('remainingCount').textContent = ROUND_SIZE - state.paired.size
  document.getElementById('scoreBadge').textContent = state.paired.size > 0
    ? `Puntuación: ${ROUND_SIZE - state.errors}`
    : 'Puntuación: —'
}

let dragData = null
let selectedItem = null

const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0

// --- Drag & Drop (desktop) ---
function onDragStart(e) {
  const el = e.target.closest('.item')
  if (!el || el.classList.contains('matched')) { e.preventDefault(); return }
  dragData = {
    literal: el.dataset.literal,
    significado: el.dataset.significado,
    side: el.dataset.side,
    el,
  }
  el.classList.add('dragging')
  e.dataTransfer.effectAllowed = 'move'
  e.dataTransfer.setData('text/plain', el.dataset.literal)
}

function onDragEnd() {
  document.querySelectorAll('.item.dragging, .item.drag-over').forEach(el => el.classList.remove('dragging', 'drag-over'))
}

function onDragOver(e) {
  e.preventDefault()
  e.dataTransfer.dropEffect = 'move'
  document.querySelectorAll('.item.drag-over').forEach(el => el.classList.remove('drag-over'))
  const el = e.target.closest('.item')
  if (el && !el.classList.contains('matched') && el.dataset.side !== dragData?.side) {
    el.classList.add('drag-over')
  }
}

function onDragLeave(e) {
  const el = e.target.closest('.item')
  if (el) el.classList.remove('drag-over')
}

function onDrop(e) {
  e.preventDefault()
  const target = e.target.closest('.item')
  if (!target || !dragData) return
  target.classList.remove('drag-over')

  const targetSide = target.dataset.side
  if (targetSide === dragData.side) return

  const sourceIsEs = dragData.side === 'es'
  const esItem = sourceIsEs ? dragData : { literal: target.dataset.literal, significado: target.dataset.significado }
  const jpItem = sourceIsEs ? { literal: target.dataset.literal, significado: target.dataset.significado } : dragData

  const sourceEl = dragData.el
  dragData = null
  sourceEl.classList.remove('dragging')

  evaluatePair(esItem, jpItem, sourceEl, target)
}

// --- Tap selection (touch) ---
function onItemClick(e) {
  const el = e.currentTarget
  if (!state.active || el.classList.contains('matched')) return

  if (selectedItem === el) {
    el.classList.remove('selected')
    selectedItem = null
    return
  }

  if (!selectedItem) {
    selectedItem = el
    el.classList.add('selected')
    return
  }

  if (selectedItem.dataset.side === el.dataset.side) {
    selectedItem.classList.remove('selected')
    selectedItem = el
    el.classList.add('selected')
    return
  }

  const esItem = selectedItem.dataset.side === 'es'
    ? { literal: selectedItem.dataset.literal, significado: selectedItem.dataset.significado }
    : { literal: el.dataset.literal, significado: el.dataset.significado }
  const jpItem = selectedItem.dataset.side === 'jp'
    ? { literal: selectedItem.dataset.literal, significado: selectedItem.dataset.significado }
    : { literal: el.dataset.literal, significado: el.dataset.significado }

  const prevEl = selectedItem
  selectedItem.classList.remove('selected')
  selectedItem = null

  evaluatePair(esItem, jpItem, prevEl, el)
}

// --- Common evaluation ---
function setItemContent(el, literal, errCount) {
  const content = el.dataset.side === 'es'
    ? el.dataset.significado
    : jpLabel({ literal, lectura: vocabIndex[literal]?.lectura || '' })
  el.innerHTML = `<span class="item-body">${content}</span>`
  if (errCount > 0 && el.dataset.side === 'jp') {
    let badge = el.querySelector('.error-badge')
    if (!badge) {
      badge = document.createElement('span')
      badge.className = 'error-badge'
      el.appendChild(badge)
    }
    badge.textContent = String(errCount)
  }
}

function evaluatePair(esItem, jpItem, elA, elB) {
  if (!state.active || state.paired.has(jpItem.literal)) return

  const correct = jpItem.significado === esItem.significado

  if (correct) {
    state.paired.add(jpItem.literal)
    showFeedback('¡Correcto!', 'success')
    const errCount = state.pairErrors[jpItem.literal] || 0
    ;[elA, elB].forEach(el => {
      el.className = 'item ' + el.dataset.side + ' matched'
      el.draggable = false
      el.removeAttribute('onclick')
      el.removeAttribute('ondragstart')
      el.removeAttribute('ondragend')
      el.removeAttribute('ondragover')
      el.removeAttribute('ondragleave')
      el.removeAttribute('ondrop')
      setItemContent(el, jpItem.literal, errCount)
    })
    updateStats()
    if (state.paired.size === ROUND_SIZE) endRound()
  } else {
    state.errors++
    state.pairErrors[jpItem.literal] = (state.pairErrors[jpItem.literal] || 0) + 1
    showFeedback('Incorrecto — intenta de nuevo', 'error')
    updateStats()
    const errCount = state.pairErrors[jpItem.literal]
    ;[elA, elB].forEach(el => {
      setItemContent(el, jpItem.literal, errCount)
    })
    elA.classList.add('wrong')
    elB.classList.add('wrong')
    setTimeout(() => {
      document.querySelectorAll('.item.wrong').forEach(el => el.classList.remove('wrong'))
    }, 600)
  }
}

function showFeedback(msg, type) {
  const bar = document.getElementById('feedbackBar')
  bar.textContent = msg
  bar.className = 'feedback-bar visible ' + type
  if (type !== 'done') {
    setTimeout(() => bar.classList.remove('visible'), 1500)
  }
}

function hideFeedback() {
  document.getElementById('feedbackBar').className = 'feedback-bar'
}

function endRound() {
  state.active = false
  const score = ROUND_SIZE - state.errors
  document.getElementById('board').style.display = 'none'
  const victory = document.getElementById('victoryScreen')
  victory.classList.add('visible')
  document.getElementById('victoryScore').textContent =
    `Puntuación final: ${score} de ${ROUND_SIZE} (${state.errors} ${state.errors === 1 ? 'fallo' : 'fallos'})`
  document.getElementById('reiniciarBtn').textContent = 'Jugar otra ronda'
  showFeedback(`¡Completado! Puntuación: ${score}/${ROUND_SIZE}`, 'done')
}

document.getElementById('reiniciarBtn').addEventListener('click', startRound)

// ---- Init ----
startRound()
</script>
</body>
</html>
