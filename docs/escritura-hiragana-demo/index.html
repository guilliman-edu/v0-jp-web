<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiragana — Escritura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: #f8fafc;
  color: #1e293b;
  min-height: 100vh;
}
.topbar {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem 1rem;
  background: white; border-bottom: 1px solid #e2e8f0;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  position: sticky; top: 0; z-index: 30;
}
.topbar-title { font-size: 1rem; font-weight: 700; color: #0f172a; }
.topbar-level {
  font-size: 0.75rem; font-weight: 600;
  background: #dbeafe; color: #1d4ed8;
  padding: 0.125rem 0.5rem; border-radius: 9999px;
}
.topbar-spacer { flex: 1; }
.score-badge {
  font-size: 0.8rem; font-weight: 600;
  background: #f1f5f9; color: #475569;
  padding: 0.25rem 0.75rem; border-radius: 9999px;
}
.main-content {
  padding: 1.5rem 1rem; max-width: 32rem; margin: 0 auto;
}
.game-header {
  text-align: center; margin-bottom: 1rem;
}
.game-header h1 { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.25rem; }
.game-header p { font-size: 0.85rem; color: #64748b; }
.game-status {
  display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.25rem;
}
.stat-box { text-align: center; }
.stat-value { font-size: 1.35rem; font-weight: 700; color: #0f172a; }
.stat-label {
  font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;
}
.progress-bar {
  width: 100%; height: 4px;
  background: #e2e8f0;
  border-radius: 2px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #3b82f6;
  border-radius: 2px;
  transition: width 0.3s ease;
}
.card {
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 1.5rem;
  padding: 2rem 1.5rem;
  text-align: center;
  margin-bottom: 1.25rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.card-prompt {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: #64748b;
  letter-spacing: 0.05em;
}
.card-prompt .romaji {
  font-family: 'Inter', sans-serif;
  font-size: 3rem;
  font-weight: 800;
  color: #0f172a;
  display: block;
  margin-top: 0.25rem;
}
.canvas-wrap {
  background: white;
  border-radius: 1rem;
  padding: 0.25rem;
  margin-bottom: 0.75rem;
  text-align: center;
}
canvas {
  display: block;
  border: 1px solid #d1d5db;
  border-radius: 0.5rem;
  touch-action: none;
  cursor: crosshair;
  width: 280px;
  height: 280px;
  margin: 0 auto;
}
.controls-row {
  display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; align-items: center;
  margin-bottom: 0.5rem;
}
.control-group {
  display: flex; align-items: center; gap: 0.375rem;
}
.control-label {
  font-size: 0.7rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;
}
.colors {
  display: flex; gap: 0.25rem;
}
.color-swatch {
  width: 1.25rem; height: 1.25rem; border-radius: 9999px; border: 2px solid transparent;
  cursor: pointer; transition: transform 0.1s; flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: #1e293b; box-shadow: 0 0 0 1px white, 0 0 0 3px #1e293b; }
input[type="range"] {
  width: 4rem; height: 0.375rem; appearance: none; background: #e2e8f0; border-radius: 9999px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  appearance: none; width: 0.875rem; height: 0.875rem; border-radius: 9999px; background: #3b82f6; cursor: pointer;
}
.canvas-toolbar {
  display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap;
  margin-bottom: 1rem;
}
.btn {
  font-family: inherit; font-size: 0.85rem; font-weight: 600;
  padding: 0.5rem 1rem; border: none; border-radius: 0.5rem;
  cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 0.375rem;
}
.btn:active { transform: scale(0.97); }
.btn-outline {
  background: white; border: 1px solid #e2e8f0; color: #475569;
}
.btn-outline:hover { background: #f1f5f9; }
.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { background: #93c5fd; cursor: default; }
.btn-success { background: #16a34a; color: white; }
.btn-success:hover { background: #15803d; }
.btn-next { background: #3b82f6; color: white; }
.btn-next:hover { background: #2563eb; }
.btn-restart { background: #3b82f6; color: white; padding: 0.75rem 2rem; font-size: 1rem; }
.btn-restart:hover { background: #2563eb; }
.feedback-bar {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  border-radius: 0.75rem;
  text-align: center;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  opacity: 0;
}
.feedback-bar.visible { opacity: 1; }
.feedback-bar.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.feedback-bar.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.feedback-bar.done { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
.correct-char {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 2.5rem;
  font-weight: 700;
  color: #16a34a;
  margin-top: 0.5rem;
}
.correct-char.error-char { color: #dc2626; }
.hidden { display: none !important; }
.victory-screen {
  display: none;
  text-align: center; padding: 2rem;
}
.victory-screen.visible { display: block; }
.victory-screen h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.victory-screen p { font-size: 1rem; color: #475569; margin-bottom: 1rem; }
.victory-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(3rem, 1fr));
  gap: 0.75rem;
  margin: 1.5rem 0;
}
.victory-char {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  padding: 0.5rem;
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 0.75rem;
  color: #0f172a;
}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Hiragana — Escritura</span>
  <span class="topbar-level" id="levelBadge">pre-A1</span>
  <span class="topbar-spacer"></span>
  <span class="score-badge" id="scoreBadge">Puntuación: —</span>
</div>

<div class="main-content">
  <div class="game-header">
    <h1>Escribe el hiragana</h1>
    <p>Mira el romaji y dibuja el carácter en el canvas</p>
  </div>

  <div class="game-status">
    <div class="stat-box">
      <div class="stat-value" id="correctCount">0</div>
      <div class="stat-label">Aciertos</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="errorsCount">0</div>
      <div class="stat-label">Fallos</div>
    </div>
    <div class="stat-box">
      <div class="stat-value" id="remainingCount">0</div>
      <div class="stat-label">Restantes</div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <div id="gameArea">
    <div class="card">
      <div class="card-prompt" id="cardPrompt">
        Escribe el hiragana para
        <span class="romaji" id="romajiTarget">a</span>
      </div>
      <div id="correctAnswer" class="correct-char hidden"></div>
    </div>

    <div class="canvas-wrap">
      <canvas id="c" width="280" height="280"></canvas>
    </div>

    <div class="controls-row">
      <div class="control-group">
        <span class="control-label">Color</span>
        <div class="colors" id="colorPicker"></div>
      </div>
      <div class="control-group">
        <span class="control-label">Grosor</span>
        <input type="range" id="sizeRange" min="1" max="12" value="4" step="0.5">
      </div>
    </div>

    <div class="canvas-toolbar">
      <button class="btn btn-outline" id="undoBtn">↩ Deshacer</button>
      <button class="btn btn-outline" id="clearBtn">✕ Limpiar</button>
      <button class="btn btn-primary" id="submitBtn">Comprobar</button>
    </div>

    <div class="feedback-bar" id="feedbackBar"></div>
  </div>

  <div class="victory-screen" id="victoryScreen">
    <h2>¡Ronda completada!</h2>
    <p id="victoryScore"></p>
    <div class="victory-grid" id="victoryGrid"></div>
    <button class="btn btn-restart" id="restartBtn">Nueva ronda</button>
  </div>
</div>

<script>
const HIRAGANA_POOL = [
  { literal: "あ", lectura: "a" },
  { literal: "い", lectura: "i" },
  { literal: "う", lectura: "u" },
  { literal: "え", lectura: "e" },
  { literal: "お", lectura: "o" },
  { literal: "か", lectura: "ka" },
  { literal: "き", lectura: "ki" },
  { literal: "く", lectura: "ku" },
  { literal: "け", lectura: "ke" },
  { literal: "こ", lectura: "ko" },
  { literal: "さ", lectura: "sa" },
  { literal: "し", lectura: "shi" },
  { literal: "す", lectura: "su" },
  { literal: "せ", lectura: "se" },
  { literal: "そ", lectura: "so" },
  { literal: "た", lectura: "ta" },
  { literal: "ち", lectura: "chi" },
  { literal: "つ", lectura: "tsu" },
  { literal: "て", lectura: "te" },
  { literal: "と", lectura: "to" },
  { literal: "な", lectura: "na" },
  { literal: "に", lectura: "ni" },
  { literal: "ぬ", lectura: "nu" },
  { literal: "ね", lectura: "ne" },
  { literal: "の", lectura: "no" },
  { literal: "は", lectura: "ha" },
  { literal: "ひ", lectura: "hi" },
  { literal: "ふ", lectura: "fu" },
  { literal: "へ", lectura: "he" },
  { literal: "ほ", lectura: "ho" },
  { literal: "ま", lectura: "ma" },
  { literal: "み", lectura: "mi" },
  { literal: "む", lectura: "mu" },
  { literal: "め", lectura: "me" },
  { literal: "も", lectura: "mo" },
  { literal: "や", lectura: "ya" },
  { literal: "ゆ", lectura: "yu" },
  { literal: "よ", lectura: "yo" },
  { literal: "ら", lectura: "ra" },
  { literal: "り", lectura: "ri" },
  { literal: "る", lectura: "ru" },
  { literal: "れ", lectura: "re" },
  { literal: "ろ", lectura: "ro" },
  { literal: "わ", lectura: "wa" },
  { literal: "を", lectura: "wo" },
  { literal: "ん", lectura: "n" },
]

const ROUND_SIZE = 10

function shuffle(arr) {
  const a = [...arr]
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]]
  }
  return a
}

/* Canvas / Tegaki */
const COLORS = ['#1e293b', '#dc2626', '#2563eb', '#16a34a', '#ea580c', '#9333ea', '#ca8a04', '#0d9488']
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const colorPicker = document.getElementById('colorPicker')
const sizeRange = document.getElementById('sizeRange')

let currentColor = '#1e293b'
let currentWidth = 4
ctx.lineCap = 'round'
ctx.lineJoin = 'round'
applyStyle()

let strokes = []
let currentIdx = 0
let drawing = false

function applyStyle() {
  ctx.strokeStyle = currentColor
  ctx.lineWidth = currentWidth
}

COLORS.forEach(c => {
  const swatch = document.createElement('div')
  swatch.className = 'color-swatch' + (c === currentColor ? ' active' : '')
  swatch.style.background = c
  swatch.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'))
    swatch.classList.add('active')
    currentColor = c
    applyStyle()
  })
  colorPicker.appendChild(swatch)
})

sizeRange.addEventListener('input', () => {
  currentWidth = parseFloat(sizeRange.value)
  applyStyle()
})

function pos(e) {
  const r = canvas.getBoundingClientRect()
  return { x: e.clientX - r.left, y: e.clientY - r.top }
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  for (let i = 0; i < currentIdx; i++) {
    const s = strokes[i]
    if (!s || s.pts.length === 0) continue
    ctx.strokeStyle = s.color
    ctx.lineWidth = s.width
    ctx.beginPath()
    ctx.moveTo(s.pts[0].x, s.pts[0].y)
    for (let j = 1; j < s.pts.length; j++) ctx.lineTo(s.pts[j].x, s.pts[j].y)
    ctx.stroke()
  }
  applyStyle()
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault()
  const p = pos(e)
  drawing = true
  strokes = strokes.slice(0, currentIdx)
  strokes.push({ pts: [p], color: currentColor, width: currentWidth })
  currentIdx = strokes.length
  ctx.beginPath()
  ctx.moveTo(p.x, p.y)
})

canvas.addEventListener('pointermove', (e) => {
  if (!drawing) return
  const p = pos(e)
  strokes[currentIdx - 1].pts.push(p)
  ctx.lineTo(p.x, p.y)
  ctx.stroke()
})

canvas.addEventListener('pointerup', () => { drawing = false })
canvas.addEventListener('pointerleave', () => { drawing = false })

function undoStroke() {
  if (currentIdx <= 0) return
  currentIdx--
  redraw()
}

function clearCanvas() {
  strokes = []
  currentIdx = 0
  drawing = false
  ctx.clearRect(0, 0, canvas.width, canvas.height)
}

function getInkData() {
  return strokes.slice(0, currentIdx).map(s => {
    const xs = s.pts.map(p => p.x)
    const ys = s.pts.map(p => p.y)
    return [xs, ys, []]
  })
}

/* Game state */
let state = {
  round: [], index: 0, correct: 0, errors: 0, answered: false,
}

function updateStats() {
  document.getElementById('correctCount').textContent = state.correct
  document.getElementById('errorsCount').textContent = state.errors
  document.getElementById('remainingCount').textContent = ROUND_SIZE - state.index
  const total = state.correct + state.errors
  document.getElementById('scoreBadge').textContent = total > 0
    ? `Puntuación: ${state.correct - state.errors}` : 'Puntuación: —'
}

function showFeedback(msg, type) {
  const bar = document.getElementById('feedbackBar')
  bar.textContent = msg; bar.className = 'feedback-bar visible ' + type
}

function hideFeedback() {
  document.getElementById('feedbackBar').className = 'feedback-bar'
}

function startRound() {
  state.round = shuffle(HIRAGANA_POOL).slice(0, ROUND_SIZE)
  state.index = 0; state.correct = 0; state.errors = 0; state.answered = false
  document.getElementById('levelBadge').textContent = 'pre-A1'
  document.getElementById('victoryScreen').classList.remove('visible')
  document.getElementById('gameArea').classList.remove('hidden')
  clearCanvas()
  showCard()
  updateStats()
  hideFeedback()
}

function showCard() {
  if (state.index >= state.round.length) { endRound(); return }
  const item = state.round[state.index]
  document.getElementById('romajiTarget').textContent = item.lectura
  document.getElementById('correctAnswer').classList.add('hidden')
  state.answered = false
  document.getElementById('submitBtn').disabled = false
  document.getElementById('progressFill').style.width = ((state.index) / ROUND_SIZE) * 100 + '%'
  clearCanvas()
  hideFeedback()
}

async function handleSubmit() {
  if (state.answered) return
  const inkData = getInkData()
  if (inkData.length === 0) {
    showFeedback('Dibuja algo antes de comprobar', 'error')
    return
  }

  const item = state.round[state.index]
  state.answered = true
  document.getElementById('submitBtn').disabled = true

  const r = canvas.getBoundingClientRect()
  const body = {
    options: 'enable_pre_space',
    requests: [{
      writing_guide: { writing_area_width: r.width, writing_area_height: r.height },
      ink: inkData, language: 'ja',
    }],
  }

  try {
    const res = await fetch(
      'https://www.google.com.tw/inputtools/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8',
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) },
    )
    const data = await res.json()
    const candidates = data[1]?.[0]?.[1] ?? []

    const ca = document.getElementById('correctAnswer')

    if (candidates.includes(item.literal)) {
      state.correct++
      ca.textContent = item.literal
      ca.className = 'correct-char'
      showFeedback('¡Correcto!', 'success')
      updateStats()
      setTimeout(nextCard, 2000)
    } else {
      state.errors++
      ca.textContent = item.literal
      ca.className = 'correct-char error-char'
      const guessed = candidates.length > 0 ? candidates[0] : '—'
      showFeedback(`Incorrecto — esperado: ${item.literal} (reconocido: ${guessed})`, 'error')
      updateStats()
      setTimeout(nextCard, 4000)
    }
  } catch (err) {
    showFeedback(`Error de conexión: ${err.message}`, 'error')
    state.answered = false
    document.getElementById('submitBtn').disabled = false
  }
}

function nextCard() {
  state.index++
  showCard()
}

function endRound() {
  state.answered = false
  const score = state.correct - state.errors
  document.getElementById('gameArea').classList.add('hidden')
  const victory = document.getElementById('victoryScreen')
  victory.classList.add('visible')
  document.getElementById('victoryScore').textContent =
    `Aciertos: ${state.correct} de ${ROUND_SIZE} (${state.errors} ${state.errors === 1 ? 'fallo' : 'fallos'})`
  document.getElementById('progressFill').style.width = '100%'
  showFeedback(`¡Completado! Puntuación: ${score}/${ROUND_SIZE}`, 'done')

  const grid = document.getElementById('victoryGrid')
  grid.innerHTML = ''
  state.round.forEach(item => {
    const div = document.createElement('div')
    div.className = 'victory-char'
    div.textContent = item.literal
    grid.appendChild(div)
  })
}

document.getElementById('undoBtn').addEventListener('click', undoStroke)
document.getElementById('clearBtn').addEventListener('click', clearCanvas)
document.getElementById('submitBtn').addEventListener('click', handleSubmit)
document.getElementById('restartBtn').addEventListener('click', startRound)

/* Keyboard shortcut: Enter to submit */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !document.getElementById('submitBtn').disabled) {
    handleSubmit()
  }
})

startRound()
</script>
</body>
</html>
