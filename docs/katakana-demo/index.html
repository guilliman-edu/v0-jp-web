  position: relative;

}
.mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.mic-btn.correct { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
.mic-btn.wrong { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
  50% { box-shadow: 0 0 0 12px rgba(220,38,38,0); }
}
.wave {
  position: absolute; display: none; gap: 3px;
  align-items: center; height: 1.25rem;
  bottom: -1.5rem; left: 50%; transform: translateX(-50%);

.wave.active { display: flex; }
.wave span {
  display: block; width: 3px;
  background: #dc2626; border-radius: 2px;
  animation: wave-bar 0.6s ease-in-out infinite;
}
.wave span:nth-child(1) { height: 0.5rem; animation-delay: 0s; }

.wave span:nth-child(3) { height: 0.5rem; animation-delay: 0.2s; }

.wave span:nth-child(5) { height: 0.4rem; animation-delay: 0.25s; }

class SeededRandom {
  constructor(seed) {
    this.state = new Uint32Array(4)
    this.state[0] = seed >>> 0
    this.state[1] = (seed * 1812433253 + 1) >>> 0
    this.state[2] = (this.state[1] * 1812433253 + 1) >>> 0
    this.state[3] = (this.state[2] * 1812433253 + 1) >>> 0
  }
  next() {
    const s = new Uint32Array(this.state)
    const result = Math.imul(s[1] * 5, 1) << 7 | (s[1] * 5) >>> 25
    const t = s[1] << 9 | s[2] >>> 23
    s[2] ^= s[0]; s[3] ^= s[1]; s[1] ^= s[2]; s[0] ^= s[3]; s[2] ^= t
    s[3] = (s[3] << 11 | s[3] >>> 21) >>> 0
    this.state = s
    return (result >>> 0) / 4294967296
  }
  shuffle(array) {
    const result = [...array]
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(this.next() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]]
    }
    return result
  }
}

/* Koe — Speech-to-text (Web Speech API, ja-JP) */
const koe = (() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  if (!SR) return null

  let _listening = false
  let _onResult = null
  let _onListeningChange = null
  let _onEnd = null
  let _gotResult = false

  function listen(onResult, onListeningChange, onEnd) {
    if (_listening) return
    _onResult = onResult
    _onListeningChange = onListeningChange
    _onEnd = onEnd
    _listening = true
    _gotResult = false
    _onListeningChange?.(true)

    const r = new SR()
    r.lang = 'ja-JP'
    r.continuous = false
    r.interimResults = false
    r.maxAlternatives = 5

    r.onresult = (e) => {
      const last = e.results[e.results.length - 1]
      const candidates = []
      for (let i = 0; i < last.length; i++) {
        candidates.push({ transcript: last[i].transcript.trim(), confidence: last[i].confidence, position: i })
      }
      _gotResult = true
      _listening = false
      _onListeningChange?.(false)
      _onResult?.(candidates)
    }

    r.onerror = () => {
      _listening = false
      _onListeningChange?.(false)
    }

    r.onend = () => {
      _listening = false
      _onListeningChange?.(false)
      if (!_gotResult) _onEnd?.()
    }

    r.start()
  }

  function cancel() {
    _listening = false
    _onListeningChange?.(false)
  }

  function isSupported() { return !!SR }
  function getListening() { return _listening }

  return { listen, cancel, isSupported, getListening }
})()

/* Main game logic */
const FUSE_DURATION = 15
let _fuseRaf = null
let _fuseStart = 0
let _fuseActive = false
let _cardNonce = 0

function startFuse() {
  if (_fuseRaf) cancelAnimationFrame(_fuseRaf)
  _fuseStart = performance.now()
  _fuseActive = true
  const burned = document.getElementById('fuseBurned')
  const time = document.getElementById('fuseTime')
  if (!burned || !time) return
  burned.style.width = '0%'
  time.textContent = String(FUSE_DURATION)

  function tick(now) {
    if (!_fuseActive) return
    const elapsed = (now - _fuseStart) / 1000
    const progress = Math.min(elapsed / FUSE_DURATION, 1)
    const pct = progress * 100
    burned.style.width = pct + '%'
    time.textContent = String(Math.max(0, Math.ceil(FUSE_DURATION - elapsed)))

    if (progress >= 1) {
      _fuseActive = false
      _fuseRaf = null
      if (!state.answered) {
        state.answered = true
        state.errors++
        updateStats()
        const entrada = state.round[state.index]
        const ca = document.getElementById('correctAnswer')
        ca.innerHTML = `Se acabó el tiempo<br>Esperado: <ruby>${entrada.literal}<rt>${entrada.lectura}</rt></ruby>`
        ca.classList.remove('hidden')
        document.getElementById('micBtn').disabled = true
        showFeedback('Se acabó el tiempo', 'error')
        _autoListenTimer = setTimeout(nextCard, 2000)
      }
      return
    }
    _fuseRaf = requestAnimationFrame(tick)
  }

  _fuseRaf = requestAnimationFrame(tick)
}

function stopFuse() {
  _fuseActive = false
  if (_fuseRaf) { cancelAnimationFrame(_fuseRaf); _fuseRaf = null }
}

function resetFuse() {
  stopFuse()
  document.getElementById('fuseBurned').style.width = '0%'
  document.getElementById('fuseTime').textContent = String(FUSE_DURATION)
}

const actividad = _LECTURA_BUNDLE.find(r => r.metadata.name === 'pre-a1-s1-katakana')
const entradas = actividad ? (actividad.data.entradas || []) : []
const nivel = actividad ? (actividad.data.nivel || 'pre-A1') : 'pre-A1'
const ROUND_SIZE = Math.min(10, entradas.length)

let state = {
  round: [], index: 0, correct: 0, errors: 0, answered: false,
}

function normalizeKatakana(s) {
  return s.replace(/[\sー\u2010-\u2015\u30FC]+/g, '').trim()
}

function matchTranscript(transcript, entrada) {
  const norm = normalizeKatakana(transcript)
  const expected = normalizeKatakana(entrada.literal)
  if (norm === expected) return true
  if (norm.includes(expected) || expected.includes(norm)) return true
  return false
}

function startRound() {
  stopFuse()
  const rng = new SeededRandom(Date.now())
  state.round = rng.shuffle([...entradas]).slice(0, ROUND_SIZE)
  state.index = 0; state.correct = 0; state.errors = 0; state.answered = false
  document.getElementById('levelBadge').textContent = nivel
  document.getElementById('victoryScreen').classList.remove('visible')
  document.getElementById('gameArea').classList.remove('hidden')
  showCard()
  updateStats()
  hideFeedback()
}

function showCard() {
  _cardNonce++
  if (state.index >= state.round.length) { endRound(); return }
  const entrada = state.round[state.index]
  document.getElementById('cardEmoji').textContent = entrada.emoji
  document.getElementById('cardLiteral').textContent = entrada.literal
  document.getElementById('cardSignificado').textContent = entrada.significado
  document.getElementById('correctAnswer').classList.add('hidden')
  state.answered = false
  document.getElementById('micBtn').disabled = false
  document.getElementById('micBtn').className = 'mic-btn'
  document.getElementById('progressFill').style.width = ((state.index) / ROUND_SIZE) * 100 + '%'
  _paused = false
  if (_autoListenTimer) { clearTimeout(_autoListenTimer); _autoListenTimer = null }
  if (_autoMic) {
    document.getElementById('micLabel').classList.add('hidden')
    resetFuse()
    startFuse()
    setTimeout(startListening, 300)
  } else {
    resetFuse()
    document.getElementById('micLabel').classList.remove('hidden')
  }
}

function updateStats() {
  document.getElementById('correctCount').textContent = state.correct
  document.getElementById('errorsCount').textContent = state.errors
  document.getElementById('remainingCount').textContent = ROUND_SIZE - state.index
  const total = state.correct + state.errors
  document.getElementById('scoreBadge').textContent = total > 0
    ? `Puntuación: ${state.correct - state.errors}` : 'Puntuación: —'
}

function showFeedback(msg, type) {
  const bar = document.getElementById('feedbackBar')
  bar.textContent = msg; bar.className = 'feedback-bar visible ' + type
}

function hideFeedback() { document.getElementById('feedbackBar').className = 'feedback-bar' }

function nextCard() {
  stopFuse()
  state.index++
  showCard()
  hideFeedback()
}

function endRound() {
  state.answered = false
  const score = state.correct - state.errors
  document.getElementById('gameArea').classList.add('hidden')
  const victory = document.getElementById('victoryScreen')
  victory.classList.add('visible')
  document.getElementById('victoryScore').textContent =
    `Aciertos: ${state.correct} de ${ROUND_SIZE} (${state.errors} ${state.errors === 1 ? 'fallo' : 'fallos'})`
  document.getElementById('progressFill').style.width = '100%'
  showFeedback(`¡Completado! Puntuación: ${score}/${ROUND_SIZE}`, 'done')
}

/* Koe integration — auto-listen */
const micBtn = document.getElementById('micBtn')
let _autoListenTimer = null
let _autoMic = false
let _paused = false

function startListening() {
  if (state.answered || _paused) return
  if (!koe || !koe.isSupported()) return
  if (koe.getListening()) return
  const nonce = _cardNonce

  function retry() {
    if (state.answered || _paused) return
    if (nonce !== _cardNonce) return
    if (!_fuseActive) { resetFuse(); startFuse() }
    setTimeout(startListening, 600)
  }

  koe.listen((candidates) => {
    if (nonce !== _cardNonce) return
    micBtn.classList.remove('listening')
    document.getElementById('wave').classList.remove('active')
    if (state.answered) return
    if (candidates.length === 0) { retry(); return }
    stopFuse()
    const entrada = state.round[state.index]
    const transcript = candidates[0].transcript
    state.answered = true
    micBtn.disabled = true
    if (matchTranscript(transcript, entrada)) {
      state.correct++
      micBtn.className = 'mic-btn correct'
      showFeedback(`¡Correcto!`, 'success')
      updateStats()
    } else {
      state.errors++
      micBtn.className = 'mic-btn wrong'
      const ca = document.getElementById('correctAnswer')
      ca.innerHTML = `Dijiste: ${transcript}<br>Esperado: <ruby>${entrada.literal}<rt>${entrada.lectura}</rt></ruby>`
      ca.classList.remove('hidden')
      showFeedback('Incorrecto — escucha la pronunciación correcta', 'error')
      updateStats()
    }
    _autoListenTimer = setTimeout(nextCard, 2000)
  }, (listening) => {
    micBtn.classList.toggle('listening', listening)
    document.getElementById('wave').classList.toggle('active', listening)
  }, retry)
}

micBtn.addEventListener('click', () => {
  if (!_autoMic) {
    if (_autoListenTimer) { clearTimeout(_autoListenTimer); _autoListenTimer = null }
    _autoMic = true
    document.getElementById('micLabel').classList.add('hidden')
    hideFeedback()
    resetFuse()
    startFuse()
    setTimeout(startListening, 300)
    return
  }
  _paused = !_paused
  if (_paused) {
    stopFuse()
    if (koe) koe.cancel()
    micBtn.classList.remove('listening')
    document.getElementById('wave').classList.remove('active')
    micBtn.className = 'mic-btn'
    showFeedback('Práctica pausada', 'partial')
  } else {
    if (_autoListenTimer) { clearTimeout(_autoListenTimer); _autoListenTimer = null }
    hideFeedback()
    startFuse()
    setTimeout(startListening, 300)
  }
})

if (!koe || !koe.isSupported()) {
  micBtn.style.display = 'none'
}

document.getElementById('restartBtn').addEventListener('click', startRound)

startRound()
</script>
