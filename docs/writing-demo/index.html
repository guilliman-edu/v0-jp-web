}
.game-header {
  text-align: center; margin-bottom: 1.5rem;

.game-status {
  display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.25rem;
}
.stat-box { text-align: center; }
.stat-value { font-size: 1.5rem; font-weight: 700; color: #0f172a; }
.stat-label {
  font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;
}
.exercise-card {
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 1rem;
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.source-sentence {
  font-size: 1.15rem;
  font-weight: 600;
  color: #0f172a;
  text-align: center;
  margin-bottom: 1rem;
  padding: 1rem;
  background: #f1f5f9;
  border-radius: 0.75rem;
}
.input-group {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
}
.input-group input {
  flex: 1 1 100%;
  padding: 0.75rem 1rem;
  border: 2px solid #e2e8f0;
  border-radius: 0.75rem;
  font-size: 1rem;
  font-family: 'Noto Sans JP', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
}
.input-group-actions {
  display: flex; gap: 0.5rem; flex: 1;
}
.input-group-actions button {
  padding: 0.75rem 1.5rem;
  background: #3b82f6; color: white; border: none;
  border-radius: 0.75rem; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
  white-space: nowrap;
}
.input-group-actions button:hover { background: #2563eb; }
.input-group-actions button:disabled { background: #93c5fd; cursor: not-allowed; }
.mic-btn {
  width: 2.75rem; height: 2.75rem;
  padding: 0;
  background: #f1f5f9; color: #475569;
  border: 2px solid #e2e8f0;
  border-radius: 0.75rem;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.35rem; flex-shrink: 0;
  position: relative;
}
@media (min-width: 480px) {
  .input-group { flex-wrap: nowrap; }
  .input-group input { flex: 1; }
  .input-group-actions { flex: 0 0 auto; }
}
.mic-btn:hover { background: #e2e8f0; border-color: #94a3b8; }
.mic-btn.listening {
  background: #fef2f2; color: #dc2626; border-color: #fca5a5;
  animation: pulse-mic 1s ease-in-out infinite;
}
.mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
@keyframes pulse-mic {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
}
.wave {
  position: absolute; display: none; gap: 2px;
  align-items: center; height: 1rem;
  bottom: -1.25rem; left: 50%; transform: translateX(-50%);
}
.wave.active { display: flex; }
.wave span {
  display: block; width: 3px;
  background: #dc2626; border-radius: 2px;
  animation: wave-bar 0.6s ease-in-out infinite;
}
.wave span:nth-child(1) { height: 0.4rem; animation-delay: 0s; }
.wave span:nth-child(2) { height: 0.7rem; animation-delay: 0.1s; }
.wave span:nth-child(3) { height: 0.4rem; animation-delay: 0.2s; }
.wave span:nth-child(4) { height: 0.6rem; animation-delay: 0.15s; }
.wave span:nth-child(5) { height: 0.35rem; animation-delay: 0.25s; }
@keyframes wave-bar {
  0%, 100% { transform: scaleY(0.4); }
  50% { transform: scaleY(1); }
}
.feedback-bar {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  border-radius: 0.75rem;
  text-align: center;
  font-weight: 600;
  font-size: 0.9rem;
  transition: all 0.3s ease;
  opacity: 0;
}
.feedback-bar.visible { opacity: 1; }
.feedback-bar.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
.feedback-bar.partial { background: #fefce8; color: #854d0e; border: 1px solid #fde68a; }
.feedback-bar.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
.feedback-bar.done { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
.actions {
  display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem;
}
.actions button {
  padding: 0.5rem 1.25rem;
  border-radius: 0.75rem;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-skip {
  background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;
}
.btn-skip:hover { background: #e2e8f0; }
.btn-retry {
  background: #fef2f2; color: #991b1b; border: 1px solid #fecaca;
}
.btn-retry:hover { background: #fde8e8; }
.btn-next {
  background: #3b82f6; color: white; border: none;
}
.btn-next:hover { background: #2563eb; }
.hidden { display: none; }
.victory-screen {
  display: none;
  text-align: center; padding: 2rem;
}
.victory-screen.visible { display: block; }
.victory-screen h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.victory-screen p { font-size: 1rem; color: #475569; margin-bottom: 1rem; }
.progress-bar {
  width: 100%; height: 4px;
  background: #e2e8f0;
  border-radius: 2px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #3b82f6;
  border-radius: 2px;
  transition: width 0.3s ease;
}

<div class="topbar">

</div>

<div class="main-content">
  <div class="game-header">
    <h1>Escribe la traducción al japonés</h1>
    <p>Lee la frase en español y escríbela en japonés</p>
  </div>

  <div class="game-status">
    <div class="stat-box">

      <div class="source-sentence" id="sourceSentence"></div>
      <div class="input-group">

        </div>
      </div>
      <div class="feedback-bar" id="feedbackBar"></div>
    </div>

    <div class="actions" id="actionsArea">
      <button class="btn-skip hidden" id="skipBtn">Saltar →</button>
    </div>
  </div>

  <div class="victory-screen" id="victoryScreen">
    <h2>¡Ejercicio completado!</h2>
    <p id="victoryScore"></p>
    <button class="btn-next" id="restartBtn">Nueva ronda</button>
  </div>
</div>

/* SeededRandom (from @maquinaria/game) */
class SeededRandom {
  constructor(seed) {
    this.state = new Uint32Array(4)
    this.state[0] = seed >>> 0
    this.state[1] = (seed * 1812433253 + 1) >>> 0
    this.state[2] = (this.state[1] * 1812433253 + 1) >>> 0
    this.state[3] = (this.state[2] * 1812433253 + 1) >>> 0
  }
  next() {
    const s = new Uint32Array(this.state)
    const result = Math.imul(s[1] * 5, 1) << 7 | (s[1] * 5) >>> 25
    const t = s[1] << 9 | s[2] >>> 23
    s[2] ^= s[0]; s[3] ^= s[1]; s[1] ^= s[2]; s[0] ^= s[3]; s[2] ^= t
    s[3] = (s[3] << 11 | s[3] >>> 21) >>> 0
    this.state = s
    return (result >>> 0) / 4294967296
  }
  shuffle(array) {
    const result = [...array]
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(this.next() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]]
    }
    return result
  }
}

/* MiniLM Embedder simulado */
function cosineSimilarity(a, b) {
  if (!a || !b || a.length !== b.length) return 0
  let dot = 0, normA = 0, normB = 0
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i]
    normA += a[i] * a[i]
    normB += b[i] * b[i]
  }
  const denom = Math.sqrt(normA) * Math.sqrt(normB)
  return denom === 0 ? 0 : dot / denom
}

async function evaluateWriting(studentText, references) {
  if (!references[0]?.embedding) {
    const norm = s => s.trim().toLowerCase().replace(/[\s　]+/g, '')
    const studentNorm = norm(studentText)
    for (const ref of references) {
      if (norm(ref.text) === studentNorm) {
        return { correct: true, accuracy: 1, similarity: 1, bestMatch: ref.text, feedback: '¡Correcto!' }
      }
    }
    return { correct: false, accuracy: 0, similarity: 0, bestMatch: references[0]?.text || '', feedback: 'Incorrecto.' }
  }

  let maxSimilarity = 0
  let bestMatch = ''
  for (const ref of references) {
    const sim = textSimilarity(studentText, ref.text)
    if (sim > maxSimilarity) {
      maxSimilarity = sim
      bestMatch = ref.text
    }
  }

  const accuracy = maxSimilarity >= 0.85 ? 1 : maxSimilarity >= 0.70 ? 0.5 : 0
  const correct = maxSimilarity >= 0.85
  let feedback
  if (correct) feedback = '¡Correcto!'
  else if (maxSimilarity >= 0.70) feedback = `Casi — revisa la forma. Referencia: ${bestMatch}`
  else feedback = `Incorrecto. Respuesta correcta: ${bestMatch}`

  return { correct, accuracy, similarity: maxSimilarity, bestMatch, feedback }
}

function textSimilarity(a, b) {
  const norm = s => s.trim().replace(/[\s　]+/g, '')
  const na = norm(a), nb = norm(b)
  if (na === nb) return 1
  if (na.includes(nb) || nb.includes(na)) return 0.9
  const setA = new Set(na), setB = new Set(nb)
  const intersection = new Set([...setA].filter(c => setB.has(c)))
  const union = new Set([...setA, ...setB])
  return intersection.size / union.size
}

/* Koe — Speech-to-text (Web Speech API, ja-JP)
   Cada pulsación del mic crea un recognizer nuevo.
   Chrome solo pide permiso UNA VEZ por origen — tras concederlo,
   las siguientes llamadas a start() no vuelven a preguntar. */
const koe = (() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  if (!SR) return null

  let _listening = false
  let _onResult = null
  let _onListeningChange = null

  function listen(onResult, onListeningChange) {
    if (_listening) return
    _onResult = onResult
    _onListeningChange = onListeningChange
    _listening = true
    _onListeningChange?.(true)

    const r = new SR()
    r.lang = 'ja-JP'
    r.continuous = false
    r.interimResults = false
    r.maxAlternatives = 5

    r.onresult = (e) => {
      const last = e.results[e.results.length - 1]
      const candidates = []
      for (let i = 0; i < last.length; i++) {
        candidates.push({ transcript: last[i].transcript.trim(), confidence: last[i].confidence, position: i })
      }
      _listening = false
      _onListeningChange?.(false)
      _onResult?.(candidates)
    }

    r.onerror = () => {
      _listening = false
      _onListeningChange?.(false)
    }

    r.onend = () => {
      _listening = false
      _onListeningChange?.(false)
    }

    r.start()
  }

  function cancel() {
    _listening = false
    _onListeningChange?.(false)
  }

  function isSupported() { return !!SR }
  function getListening() { return _listening }

  return { listen, cancel, isSupported, getListening }
})()

/* Main game logic */
const actividad = _ESCRITURA_BUNDLE[0]
const ejercicios = actividad.data.ejercicios || []
const nivel = actividad.data.nivel || 'A1'
const ROUND_SIZE = Math.min(10, ejercicios.length)

let state = {
  round: [], index: 0, correct: 0, errors: 0, answered: false,
}

function startRound() {
  const rng = new SeededRandom(Date.now())
  state.round = rng.shuffle([...ejercicios]).slice(0, ROUND_SIZE)
  state.index = 0; state.correct = 0; state.errors = 0; state.answered = false
  document.getElementById('levelBadge').textContent = nivel
  document.getElementById('victoryScreen').classList.remove('visible')
  document.getElementById('gameArea').classList.remove('hidden')
  showExercise(); updateStats(); hideFeedback()
}

function showExercise() {
  if (state.index >= state.round.length) { endRound(); return }
  const ej = state.round[state.index]
  document.getElementById('sourceSentence').textContent = ej.source
  document.getElementById('answerInput').value = ''
  document.getElementById('answerInput').disabled = false
  if (!('ontouchstart' in window) && navigator.maxTouchPoints === 0) {
    document.getElementById('answerInput').focus()
  }
  document.getElementById('submitBtn').disabled = false
  document.getElementById('submitBtn').textContent = 'Comprobar'
  state.answered = false
  document.getElementById('skipBtn').classList.add('hidden')
  document.getElementById('progressFill').style.width = ((state.index) / ROUND_SIZE) * 100 + '%'
}

function updateStats() {
  document.getElementById('correctCount').textContent = state.correct
  document.getElementById('errorsCount').textContent = state.errors
  document.getElementById('remainingCount').textContent = ROUND_SIZE - state.index
  const total = state.correct + state.errors
  document.getElementById('scoreBadge').textContent = total > 0
    ? `Puntuación: ${state.correct - state.errors}` : 'Puntuación: —'
}

function showFeedback(msg, type) {
  const bar = document.getElementById('feedbackBar')
  bar.textContent = msg; bar.className = 'feedback-bar visible ' + type
}

function hideFeedback() { document.getElementById('feedbackBar').className = 'feedback-bar' }

async function handleSubmit() {
  if (state.answered) return
  const input = document.getElementById('answerInput')
  const text = input.value.trim()
  if (!text) return
  const ej = state.round[state.index]
  const refs = ej.references || []
  if (refs.length === 0) { showFeedback('No hay referencias', 'error'); return }
  input.disabled = true
  document.getElementById('submitBtn').disabled = true
  state.answered = true
  const references = refs.map(r => typeof r === 'string' ? { text: r } : r)
  const result = await evaluateWriting(text, references)
  if (result.correct) { state.correct++; showFeedback(result.feedback, 'success') }
  else if (result.accuracy >= 0.5) { state.errors++; showFeedback(result.feedback, 'partial') }
  else { state.errors++; showFeedback(result.feedback, 'error') }
  updateStats()
  const skipBtn = document.getElementById('skipBtn')
  skipBtn.classList.remove('hidden')
  skipBtn.textContent = 'Siguiente →'
  skipBtn.className = 'btn-next'
  skipBtn.onclick = () => { state.index++; showExercise(); hideFeedback() }
}

document.getElementById('submitBtn').addEventListener('click', handleSubmit)
document.getElementById('answerInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSubmit()
})

/* Mic button / Koe integration */
const micBtn = document.getElementById('micBtn')
if (koe && koe.isSupported()) {
  micBtn.addEventListener('click', () => {
    if (koe.getListening()) { koe.cancel(); micBtn.classList.remove('listening'); document.getElementById('wave').classList.remove('active'); return }
    if (state.answered) return
    koe.listen((candidates) => {
      micBtn.classList.remove('listening')
      document.getElementById('wave').classList.remove('active')
      if (candidates.length > 0) {
        document.getElementById('answerInput').value = candidates[0].transcript
        handleSubmit()
      }
    }, (listening) => {
      micBtn.classList.toggle('listening', listening)
      document.getElementById('wave').classList.toggle('active', listening)
    })
  })
} else {
  micBtn.style.display = 'none'
}

function endRound() {
  state.answered = false
  const score = state.correct - state.errors
  document.getElementById('gameArea').classList.add('hidden')
  const victory = document.getElementById('victoryScreen')
  victory.classList.add('visible')
  document.getElementById('victoryScore').textContent =
    `Aciertos: ${state.correct} de ${ROUND_SIZE} (${state.errors} ${state.errors === 1 ? 'fallo' : 'fallos'})`
  document.getElementById('progressFill').style.width = '100%'
  showFeedback(`¡Completado! Puntuación: ${score}/${ROUND_SIZE}`, 'done')
}

document.getElementById('restartBtn').addEventListener('click', startRound)

startRound()
</script>
