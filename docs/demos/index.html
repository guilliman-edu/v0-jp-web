<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demos — v0-jp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: #f8fafc;
  color: #1e293b;
  min-height: 100vh;
}
.topbar {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.75rem 1rem;
  background: white; border-bottom: 1px solid #e2e8f0;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  position: sticky; top: 0; z-index: 30;
}
.topbar-title { font-size: 1.15rem; font-weight: 700; color: #0f172a; }
.topbar-badge {
  font-size: 0.75rem; font-weight: 600;
  background: #dbeafe; color: #1d4ed8;
  padding: 0.125rem 0.5rem; border-radius: 9999px;
}
.main-content { padding: 2rem 1rem; max-width: 64rem; margin: 0 auto; }
.main-content h1 { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 0.25rem; }
.subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 1.5rem; }
.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.75rem;
}
@media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 1024px) { .grid { grid-template-columns: 1fr 1fr 1fr; } }
.card {
  display: flex; flex-direction: column; gap: 0.35rem;
  background: white;
  border: 1px solid #e2e8f0;
  border-radius: 1rem;
  padding: 1.25rem;
  text-decoration: none;
  color: inherit;
  transition: all 0.15s;
}
.card:hover { border-color: #3b82f6; background: #eff6ff; }
.card-icon {
  display: flex; align-items: center; justify-content: center;
  width: 3rem; height: 3rem;
  border-radius: 0.75rem;
  margin-bottom: 0.5rem;
}
.card-icon svg { width: 1.5rem; height: 1.5rem; stroke: white; }
.card-icon.is-text { font-size: 1.25rem; font-weight: 700; color: white; font-family: 'Noto Sans JP', sans-serif; }
.card-title { font-size: 1rem; font-weight: 700; color: #0f172a; }
.card-desc { font-size: 0.85rem; color: #64748b; line-height: 1.4; }
.card-adr { font-size: 0.7rem; color: #94a3b8; margin-top: 0.25rem; }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">Demos</span>
  <span class="topbar-badge">catálogo</span>
</div>
<div class="main-content">
  <h1>Catálogo de demos</h1>
  <p class="subtitle">Cada demo muestra un tipo de actividad o herramienta pedagógica.</p>
  <div class="grid" id="cardGrid"></div>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
const DEMOS = [
  {
    "title": "escritura-hiragana",
    "url": "../escritura-hiragana-demo/",
    "desc": "Escritura hiragana con tegaki (handwriting)",
    "adr": "0067",
    "color": "#a855f7",
    "iconText": "あ"
  },
  {
    "title": "katakana",
    "url": "../katakana-demo/",
    "desc": "Pronunciación katakana con reconocimiento de voz",
    "adr": "0066",
    "color": "#dc2626",
    "iconText": "ア"
  },
  {
    "title": "pairing",
    "url": "../pairing-demo/",
    "desc": "Emparejamiento JA-ES drag & drop",
    "adr": "0046",
    "color": "#7c3aed",
    "iconLucide": "Shuffle"
  },
  {
    "title": "reading",
    "url": "../reading-demo/",
    "desc": "Lectura con audio sincronizado (karaoke, práctica たい)",
    "adr": "0060",
    "color": "#0d9488",
    "iconLucide": "BookOpen"
  },
  {
    "title": "writing",
    "url": "../writing-demo/",
    "desc": "Traducción inversa (escritura) con Koe",
    "adr": "0053",
    "color": "#0891b2",
    "iconLucide": "PenSquare"
  },
  {
    "title": "visor",
    "url": "../lecciones/",
    "desc": "Slideshow de lección",
    "adr": "0016",
    "color": "#3b82f6",
    "iconLucide": "Slides"
  },
  {
    "title": "hub",
    "url": "../hubs/lecciones/a1/",
    "desc": "Índice de lecciones por nivel (timeline)",
    "adr": "0022",
    "color": "#16a34a",
    "iconLucide": "LayoutDashboard"
  },
  {
    "title": "deck",
    "url": "../deck/",
    "desc": "Panel del estudiante (punto de entrada)",
    "adr": "0040, 0043",
    "color": "#db2777",
    "iconLucide": "Layout"
  },
  {
    "title": "tegaki",
    "url": "../tegaki-demo/",
    "desc": "Escritura a mano — dibuja y reconoce kanji/kana",
    "adr": "0067",
    "color": "#6366f1",
    "iconLucide": "PenTool"
  },
  {
    "title": "zunou",
    "url": "../demo-zunou.html",
    "desc": "Corrección ortográfica ML en cliente (頭脳)",
    "adr": "0048, 0049",
    "color": "#4f46e5",
    "iconLucide": "Brain"
  },
  {
    "title": "speech",
    "url": "../demo-esp.html",
    "desc": "Reconocimiento de voz / pronunciación (Koe)",
    "adr": "0029, 0030, 0031",
    "color": "#ea580c",
    "iconLucide": "Mic"
  },
  {
    "title": "game",
    "url": "../demo-esp.html",
    "desc": "Juego completo (emparejamiento + pronunciación)",
    "adr": "0032, 0033, 0034, 0035",
    "color": "#d97706",
    "iconLucide": "Gamepad2"
  }
]

function render() {
  const grid = document.getElementById('cardGrid')
  grid.innerHTML = DEMOS.map(d => {
    const iconHtml = d.iconLucide
      ? `<i data-lucide="${d.iconLucide}" style="stroke: white;"></i>`
      : `<span class="is-text">${d.iconText}</span>`
    return `<a class="card" href="${d.url}">
      <div class="card-icon" style="background:${d.color}">${iconHtml}</div>
      <span class="card-title">${d.title}</span>
      <span class="card-desc">${d.desc}</span>
      <span class="card-adr">${d.adr}</span>
    </a>`
  }).join('')
  lucide.createIcons()
}
render()
</script>
</body>
</html>
